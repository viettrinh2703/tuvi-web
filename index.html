const _CAN_NGAY=['Giáp','Ất','Bính','Đinh','Mậu','Kỷ','Canh','Tân','Nhâm','Quý']
const _CHI_NGAY=['Tý','Sửu','Dần','Mão','Thìn','Tỵ','Ngọ','Mùi','Thân','Dậu','Tuất','Hợi']
// Can chi ngày từ ngày dương (qua JDN)
function canChiNgay(dd,mm,yy){
  const jd=jdFromDate(dd,mm,yy)
  return {can:_CAN_NGAY[(jd+9)%10], chi:_CHI_NGAY[(jd+1)%12], jd}
}
// cung đối (xung chiếu) theo chiName
function _oppCungName(cungName){
  const idx=cungList.indexOf(cungName); if(idx<0) return null
  return cungList[(idx+6)%12]
}
// Sao nào ở cung (tên cung) — chính tinh
function _mainStarsAtCungName(natalResult, cungName){
  for(let b=1;b<=12;b++) if(chiName(b)===cungName) return natalResult.mainStarsByPalace[b]||[]
  return []
}
// cung chức năng gốc mà 1 tên cung địa chi đang mang
function _chucNangAtCungName(natalResult, cungName){
  for(let b=1;b<=12;b++) if(chiName(b)===cungName) return natalResult.palaceMap[b]
  return null
}

// Chấm điểm 1 ngày. Trả {score, tags[], luuNhatCung, chucNang}
function scoreLuuNhat(natalResult, transit, luuNhatCungName, canNgay){
  const tags=[]; let score=0
  const menhCungName=chiName(natalResult.menhIndex)
  const luuNienMenh=transit.trungPhung?.luuNienMenhIdx!=null?chiName(transit.trungPhung.luuNienMenhIdx):null
  const oppNgay=_oppCungName(luuNhatCungName)
  const hoaMapNgay=TU_HOA_MAP[canNgay]||{}

  // Chỉ số 1: Trùng phùng — cung ngày đè lên cung gốc nào
  const chucNang=_chucNangAtCungName(natalResult, luuNhatCungName)

  // Chỉ số 2.1: Sinh Niên hóa nằm sẵn ở ô ngày
  const starsAtNgay=_mainStarsAtCungName(natalResult, luuNhatCungName)
  const snMap=TU_HOA_MAP[natalResult.ys]||{}
  for(const s of starsAtNgay){
    if(snMap[s]==='Hóa Kỵ'){ score-=2; tags.push('có áp lực tiềm ẩn sẵn ('+'Kỵ gốc'+')') }
    if(snMap[s]==='Hóa Lộc'){ score+=1; tags.push('có nền may sẵn (Lộc gốc)') }
  }

  // Chỉ số 2.2: Lưu Niên Kỵ (can năm) trúng / xung ô ngày
  const lnMap=TU_HOA_MAP[transit.transitYS]||{}
  let lnKyStar=null; for(const [s,h] of Object.entries(lnMap)) if(h==='Hóa Kỵ'){lnKyStar=s;break}
  if(lnKyStar){
    const kyAtNgay=starsAtNgay.includes(lnKyStar)
    const kyAtOpp=_mainStarsAtCungName(natalResult, oppNgay).includes(lnKyStar)
    if(kyAtNgay){ score-=2; tags.push('rắc rối của năm dồn vào ngày này') }
    else if(kyAtOpp){ score-=1; tags.push('rắc rối của năm xung chiếu ngày này') }
  }

  // Chỉ số 2.3: Can ngày phi tứ hóa
  // Lộc/Khoa nhập Lưu Nhật Mệnh hoặc Mệnh gốc -> tốt (tính cả xung chiếu)
  for(const [s,h] of Object.entries(hoaMapNgay)){
    const palOfStar=(()=>{ for(let b=1;b<=12;b++) if((natalResult.mainStarsByPalace[b]||[]).includes(s)) return chiName(b); return null })()
    if(palOfStar==null) continue
    const hitNgay=(palOfStar===luuNhatCungName), hitMenh=(palOfStar===menhCungName)
    const hitLuuMenh=(luuNienMenh&&palOfStar===luuNienMenh)
    const xungNgay=(palOfStar===oppNgay), xungMenh=(palOfStar===_oppCungName(menhCungName))
    if(h==='Hóa Lộc'||h==='Hóa Khoa'){
      if(hitNgay||hitMenh){ score+=2; tags.push('ngày có lộc/hanh thông') }
      else if(xungNgay||xungMenh){ score+=1; tags.push('có chút thuận lợi chiếu tới') }
    }
    if(h==='Hóa Kỵ'){
      if(hitNgay||hitMenh||hitLuuMenh){ score-=2; tags.push('ngày dễ trục trặc/hao tổn') }
      else if(xungNgay||xungMenh){ score-=1; tags.push('có chuyện xung khắc chiếu tới') }
    }
  }
  return {score, tags, luuNhatCung:luuNhatCungName, chucNang, canNgay}
}

// Quét từ ngày dương đang xét tới hết tháng âm. onlyStrong=true chỉ giữ ngày mạnh.
function buildLuuNhatThang(natalResult, transit, fromDd, fromMm, fromYy, onlyStrong=true){
  const startLunar=solar2Lunar(fromDd, fromMm, fromYy, 7)
  const luuNguyetCung=transit.luuNguyet
  if(!luuNguyetCung) return []
  const days=[]
  let dd=fromDd, mm=fromMm, yy=fromYy, guard=0
  while(guard++<40){
    const lunar=solar2Lunar(dd,mm,yy,7)
    if(lunar.lunarMonth!==startLunar.lunarMonth || lunar.lunarYear!==startLunar.lunarYear) break
    const lunarDay=lunar.lunarDay
    const idx=cungList.indexOf(luuNguyetCung)
    const luuNhatCung=cungList[(idx+lunarDay-1)%12]
    const cc=canChiNgay(dd,mm,yy)
    const sc=scoreLuuNhat(natalResult, transit, luuNhatCung, cc.can)
    days.push({duong:`${dd}/${mm}`, am:lunarDay, canChi:cc.can+' '+cc.chi, ...sc})
    const nd=new Date(yy,mm-1,dd); nd.setDate(nd.getDate()+1)
    dd=nd.getDate(); mm=nd.getMonth()+1; yy=nd.getFullYear()
  }
  const mapped=days.map(d=>({
    duong:d.duong, am:d.am, canChi:d.canChi,
    ngay:`${d.duong} (âm ${d.am}, ${d.canChi})`,
    tinhChat: d.score>=2?'tốt':(d.score<=-2?'xấu':'bình thường'),
    diem:d.score, linhVuc:d.chucNang, dauHieu:[...new Set(d.tags)]
  }))
  return onlyStrong ? mapped.filter(d=>Math.abs(d.diem)>=2) : mapped
}

// ── Lưu Nguyệt 12 tháng: chấm điểm từng tháng trong năm xem ──
// Dùng cho chủ đề lẻ để chỉ ra tháng nào tốt/xấu cho lĩnh vực đó.
function buildLuuNguyet12Thang(natalResult, transit, engine){
  const out=[]
  for(let m=1;m<=12;m++){
    const cung=engine.getLuuNguyet(m)
    const canThang=engine.getCanThang(transit.transitYS, m)
    const an=analyzeLuuNguyet(natalResult, canThang, m)
    let tinhChat='bình thường', diem=0
    if(an){
      if(an.cungXau){ diem-=2 }
      if(an.cungTot){ diem+=2 }
      tinhChat = diem>=2?'tốt':(diem<=-2?'xấu':'bình thường')
    }
    out.push({
      thang:m, cung, canThang,
      cungXau:an?.cungXau, saoKy:an?.saoKy,
      cungTot:an?.cungTot, saoLoc:an?.saoLoc,
      tinhChat, diem
    })
  }
  return out
}

// Chấm điểm 1 tháng (cấp Lưu Nguyệt) — không có can tháng nên xét Sinh Niên + Lưu Niên
function scoreLuuNguyet(natalResult, transit, luuNguyetCungName){
  const tags=[]; let score=0
  const chucNang=_chucNangAtCungName(natalResult, luuNguyetCungName)
  const oppCung=_oppCungName(luuNguyetCungName)
  const starsHere=_mainStarsAtCungName(natalResult, luuNguyetCungName)
  // Sinh Niên hóa nằm sẵn
  const snMap=TU_HOA_MAP[natalResult.ys]||{}
  for(const s of starsHere){
    if(snMap[s]==='Hóa Kỵ'){ score-=2; tags.push('áp lực nền tảng (Kỵ gốc)') }
    if(snMap[s]==='Hóa Lộc'){ score+=2; tags.push('nền may sẵn (Lộc gốc)') }
    if(snMap[s]==='Hóa Khoa'){ score+=1; tags.push('có quý nhân (Khoa gốc)') }
  }
  // Lưu Niên hóa (can năm) trúng/xung cung tháng
  const lnMap=TU_HOA_MAP[transit.transitYS]||{}
  for(const [s,h] of Object.entries(lnMap)){
    const atHere=starsHere.includes(s)
    const atOpp=_mainStarsAtCungName(natalResult, oppCung).includes(s)
    if(h==='Hóa Lộc'){ if(atHere){score+=2;tags.push('cơ hội của năm dồn vào tháng này')} else if(atOpp){score+=1;tags.push('cơ hội chiếu tới')} }
    if(h==='Hóa Khoa'){ if(atHere){score+=1;tags.push('quý nhân của năm trợ giúp')} }
    if(h==='Hóa Kỵ'){ if(atHere){score-=2;tags.push('rắc rối của năm dồn vào tháng này')} else if(atOpp){score-=1;tags.push('rắc rối xung chiếu tháng này')} }
  }
  return {score, tags, chucNang}
}

// STEP 8A: INTERPRET ENGINE (cũ — đã vô hiệu, giữ hàm để không vỡ tham chiếu)
// ══════════════════════════════════════════════════
const QUESTIONNAIRE = null

// ── Config hướng đối tượng: targetTopic -> tên chủ đề ──
const TOPIC_MAP = {
  quan_loc:  'Quan Lộc (Công việc)',
  tai_bach:  'Tài Bạch (Tài chính)',
  tinh_cam:  'Phu Thê (Tình cảm / Hôn nhân)',
  dien_trach:'Điền Trạch (Nhà cửa, xe cộ, nơi ở)',
  // con_cai: 'Tử Tức (Con cái)',        // mở sau
  // suc_khoe:'Tật Ách (Sức khỏe)',       // mở sau
}
// Tổng quan tháng = gộp 3 chủ đề
const TONG_QUAN_TOPICS = ['quan_loc','tai_bach','tinh_cam']

// ── Cung chính của mỗi topic (dùng cho xung chiếu khi điểm = 0) ──
const TOPIC_CUNG_CHINH = {
  quan_loc:'Quan Lộc', tai_bach:'Tài Bạch', tinh_cam:'Phu Thê',
  dien_trach:'Điền Trạch', con_cai:'Tử Tức', suc_khoe:'Tật Ách',
}

// ── 7 nhóm tính cách -> chính tinh ──
const NHOM_CHINH_TINH = {
  Control:['Tử Vi','Thất Sát'], Stability:['Thiên Phủ','Vũ Khúc'],
  Risk:['Phá Quân','Tham Lang'], Adapt:['Thiên Cơ','Thiên Đồng'],
  Logic:['Văn Xương','Văn Khúc'], Emotion:['Thái Âm','Cự Môn'],
  Justice:['Thiên Tướng','Thiên Lương'],
}

const PRIORITY_ORDER = ['Mệnh','Quan Lộc','Tài Bạch','Phu Thê','Tật Ách',
  'Điền Trạch','Tử Tức','Phụ Mẫu','Huynh Đệ','Nô Bộc','Thiên Di','Phúc Đức']

const XUNG_CHIEU = {
  'Mệnh':['Tài Bạch','Quan Lộc'],'Tài Bạch':['Mệnh','Quan Lộc'],'Quan Lộc':['Mệnh','Tài Bạch'],
  'Phu Thê':['Tật Ách','Thiên Di'],'Tật Ách':['Phu Thê','Thiên Di'],'Thiên Di':['Phu Thê','Tật Ách'],
  'Phụ Mẫu':['Huynh Đệ','Điền Trạch'],'Huynh Đệ':['Phụ Mẫu','Điền Trạch'],'Điền Trạch':['Phụ Mẫu','Huynh Đệ'],
  'Tử Tức':['Phúc Đức','Nô Bộc'],'Phúc Đức':['Tử Tức','Nô Bộc'],'Nô Bộc':['Tử Tức','Phúc Đức'],
}

// ── Helpers ──
// Parse "Phu Thê / Thiên Di" -> ['Phu Thê','Thiên Di']; "không" -> []
function parseCungField(s){
  if(!s||s==='không') return []
  return s.split('/').map(x=>x.trim())
    .map(x=>x.replace(/\s*\(tật\)\s*/,'').trim())  // bỏ hậu tố "(tật)"
    .filter(Boolean)
}
// Parse "CONTROL (3) + RISK (1)" -> [{nhom:'Control',diem:3},{nhom:'Risk',diem:1}]
function parseNhomMap(s){
  if(!s) return []
  return s.split('+').map(part=>{
    const m=part.trim().match(/^([A-Za-zÀ-ỹ]+)\s*\((\d+)\)/)
    if(!m) return null
    return {nhom:capitalize(m[1]), diem:+m[2]}
  }).filter(Boolean)
}
// Parse "Tử Vi (9) - Thất Sát (7)" -> điểm cao nhất = 9
function parseChinhTinhMaxDiem(s){
  if(!s) return 10
  const nums=[...s.matchAll(/\((\d+)\)/g)].map(m=>+m[1])
  return nums.length?Math.max(...nums):10
}
function capitalize(w){
  const map={'CONTROL':'Control','STABILITY':'Stability','RISK':'Risk','ADAPT':'Adapt',
    'LOGIC':'Logic','EMOTION':'Emotion','JUSTICE':'Justice'}
  return map[w.toUpperCase()]||w
}

// Lấy chính tinh của 1 cung (theo tên cung). Vô chính diệu -> mượn sao cung đối.
function getChinhTinhOfPalace(chart, cungName){
  // palaceMap: {branchIdx: tênCung}. Tìm branchIdx của cungName.
  let branchIdx=null
  for(const [bi,name] of Object.entries(chart.palaceMap)){
    if(name===cungName){ branchIdx=+bi; break }
  }
  if(branchIdx===null) return {stars:[],borrowed:false}
  let stars=(chart.mainStarsByPalace[branchIdx]||[]).slice()
  let borrowed=false
  if(stars.length===0){
    // mượn sao cung đối (cách 6)
    const oppIdx=((branchIdx-1+6)%12)+1
    stars=(chart.mainStarsByPalace[oppIdx]||[]).slice()
    borrowed=true
  }
  return {stars,borrowed,branchIdx}
}

// ── Chuẩn hóa đáp án về mảng: 'A' -> ['A']; ['A','C'] giữ nguyên; null -> [] ──
function normalizeAns(ans){
  if(ans==null) return []
  if(Array.isArray(ans)) return ans.filter(Boolean)
  return [ans]
}

// ── TÍNH ĐIỂM CUNG (định lượng) ──
// answers: {qid: 'A' | ['A','C']}. Chọn nhiều -> cộng điểm tất cả đáp án.
function tinhDiemCung(questions, answers){
  const score={}
  for(const q of questions){
    for(const ans of normalizeAns(answers[q.id])){
      const idx=ans.charCodeAt(0)-65  // 'A'->0
      const lc=q.lua_chon[idx]; if(!lc) continue
      const cungs=parseCungField(lc.map_cung)
      const ts=lc.trong_so||0
      for(const c of cungs){ score[c]=(score[c]||0)+ts }  // map kép: cộng cả 2
    }
  }
  return score
}

// ── TÍNH NHÓM TÍNH CÁCH từ ĐT1/ĐT2 ──
function tinhNhomTinhCach(dinhTinhQs, answers){
  const score={}
  dinhTinhQs.forEach((q)=>{
    for(const ans of normalizeAns(answers[q.id])){
      const idx=ans.charCodeAt(0)-65
      const lc=q.lua_chon[idx]; if(!lc) continue
      const nhom=capitalize(lc.map_nhom)
      // ĐT1 có trong_so=10; ĐT2 dùng điểm chính tinh cao nhất
      const diem=lc.trong_so!=null?lc.trong_so:parseChinhTinhMaxDiem(lc.chinh_tinh)
      score[nhom]=(score[nhom]||0)+diem
    }
  })
  // nhóm điểm cao nhất
  let best=null,bestD=-1
  for(const [n,d] of Object.entries(score)) if(d>bestD){bestD=d;best=n}
  return {nhomScore:score, nhom:best}
}

// ── TÍNH BASELINE từ QC1-QC6 ──
function tinhBaselineQC(answers){
  const qcQs=QUESTIONNAIRE.chung.cau_hoi_tinh_cach_nen
  const score={}
  for(const q of qcQs){
    for(const ans of normalizeAns(answers[q.id])){
      const idx=ans.charCodeAt(0)-65
      const lc=q.lua_chon[idx]; if(!lc) continue
      for(const {nhom,diem} of parseNhomMap(lc.map)){ score[nhom]=(score[nhom]||0)+diem }
    }
  }
  let best=null,bestD=-1
  for(const [n,d] of Object.entries(score)) if(d>bestD){bestD=d;best=n}
  return {qcScore:score, nhom:best}
}

// top N cung theo điểm (kèm xử lý bằng điểm)
function topCung(score, n){
  const arr=Object.entries(score).filter(([c])=>c!=='không').map(([c,d])=>({cung:c,diem:d}))
  arr.sort((a,b)=>b.diem-a.diem || PRIORITY_ORDER.indexOf(a.cung)-PRIORITY_ORDER.indexOf(b.cung))
  return arr.slice(0,n)
}

// chính tinh của cung có thuộc nhóm không
function chinhTinhThuocNhom(stars, nhom){
  if(!nhom) return false
  const list=NHOM_CHINH_TINH[nhom]||[]
  return stars.some(s=>list.includes(s))
}

// ══════════════════════════════════════════════════
// HÀM CHÍNH: luận 1 chủ đề
// ══════════════════════════════════════════════════
function interpretTopic(chart, answers, topicKey){
  const chuDeName=TOPIC_MAP[topicKey]
  const chuDe=QUESTIONNAIRE.cac_chu_de.find(c=>c.chu_de===chuDeName)
  if(!chuDe) return {error:'Không tìm thấy chủ đề '+topicKey}
  const cungChinh=TOPIC_CUNG_CHINH[topicKey]
  const debug={steps:[]}

  // ── TẦNG CUNG TẬT ──
  // B1: điểm cung
  const scoreCT=tinhDiemCung(chuDe.cung_tat, answers)
  debug.steps.push({step:1, scoreCungTat:scoreCT})
  const tong=Object.values(scoreCT).reduce((a,b)=>a+b,0)

  let cungTat=null, cungTatReason=''
  if(tong===0){
    // B7: điểm = 0 -> xung chiếu tam hợp với cung CHÍNH
    const xc=XUNG_CHIEU[cungChinh]||[]
    cungTat=xc[0]||cungChinh
    cungTatReason='Điểm=0 → xung chiếu tam hợp với cung chính '+cungChinh+' → '+cungTat
  } else {
    const top2=topCung(scoreCT,2)
    debug.steps.push({step:'1-top2', top2})
    // B2: chính tinh top2
    const ct0=getChinhTinhOfPalace(chart, top2[0].cung)
    const ct1=top2[1]?getChinhTinhOfPalace(chart, top2[1].cung):{stars:[]}
    debug.steps.push({step:2, [top2[0].cung]:ct0.stars, [top2[1]?.cung]:ct1.stars})
    // B3: nhóm tính cách
    const {nhom}=tinhNhomTinhCach(chuDe.cau_hoi_tinh_cach_dinh_tinh, answers)
    debug.steps.push({step:3, nhom})
    // B4: khớp nhóm?
    const khop0=chinhTinhThuocNhom(ct0.stars, nhom)
    const khop1=top2[1]?chinhTinhThuocNhom(ct1.stars, nhom):false
    debug.steps.push({step:4, khop0, khop1})
    if(khop0 && !khop1){ cungTat=top2[0].cung; cungTatReason='B4: chỉ top1 khớp nhóm '+nhom }
    else if(khop1 && !khop0){ cungTat=top2[1].cung; cungTatReason='B4: chỉ top2 khớp nhóm '+nhom }
    else {
      // B5: QC baseline
      const {nhom:qcNhom}=tinhBaselineQC(answers)
      const qc0=chinhTinhThuocNhom(ct0.stars, qcNhom)
      const qc1=top2[1]?chinhTinhThuocNhom(ct1.stars, qcNhom):false
      debug.steps.push({step:5, qcNhom, qc0, qc1})
      if(qc0 && !qc1){ cungTat=top2[0].cung; cungTatReason='B5: QC baseline '+qcNhom+' khớp top1' }
      else if(qc1 && !qc0){ cungTat=top2[1].cung; cungTatReason='B5: QC baseline '+qcNhom+' khớp top2' }
      else {
        // B6: khác điểm -> top1; bằng điểm -> priority
        if(top2.length<2 || top2[0].diem!==top2[1].diem){ cungTat=top2[0].cung; cungTatReason='B6: top1 điểm cao hơn' }
        else {
          const p0=PRIORITY_ORDER.indexOf(top2[0].cung), p1=PRIORITY_ORDER.indexOf(top2[1].cung)
          cungTat=p0<=p1?top2[0].cung:top2[1].cung
          cungTatReason='B6: bằng điểm → priority order'
        }
      }
    }
  }

  // ── TẦNG TẬT CỦA TẬT (B8) ──
  const scoreTT=tinhDiemCung(chuDe.tat_cua_tat, answers)
  const tongTT=Object.values(scoreTT).reduce((a,b)=>a+b,0)
  let tatCuaTat=null, tatReason=''
  if(tongTT===0){
    const xc=XUNG_CHIEU[cungTat]||[]
    tatCuaTat=xc[0]||cungTat
    tatReason='Điểm=0 → xung chiếu tam hợp với Cung Tật '+cungTat
  } else {
    const topT=topCung(scoreTT,2)
    if(topT.length<2 || topT[0].diem!==topT[1].diem){ tatCuaTat=topT[0].cung; tatReason='Top1 điểm cao nhất' }
    else {
      const p0=PRIORITY_ORDER.indexOf(topT[0].cung), p1=PRIORITY_ORDER.indexOf(topT[1].cung)
      tatCuaTat=p0<=p1?topT[0].cung:topT[1].cung
      tatReason='Bằng điểm → priority order'
    }
  }

  const ctStars=cungTat?getChinhTinhOfPalace(chart,cungTat):{stars:[]}
  const ttStars=tatCuaTat?getChinhTinhOfPalace(chart,tatCuaTat):{stars:[]}
  return {
    topic:topicKey, chuDe:chuDeName, cungChinh,
    cungTat, cungTatStars:ctStars.stars, cungTatBorrowed:ctStars.borrowed, cungTatReason,
    tatCuaTat, tatCuaTatStars:ttStars.stars, tatCuaTatBorrowed:ttStars.borrowed, tatReason,
    nhomTinhCach:tinhNhomTinhCach(chuDe.cau_hoi_tinh_cach_dinh_tinh, answers).nhom,
    qcBaseline:tinhBaselineQC(answers).nhom,
    debug
  }
}

// Auto-format DD/MM/YYYY khi gõ (thêm / tự động)
function formatDateInput(el){
  let v=el.value.replace(/[^\d]/g,'')
  if(v.length>8) v=v.slice(0,8)
  if(v.length>4) v=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4)
  else if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2)
  el.value=v
}
// Parse DD/MM/YYYY → {dd,mm,yy} hoặc null
function parseDMY(str){
  const p=(str||'').trim().split('/')
  if(p.length!==3) return null
  const dd=parseInt(p[0]),mm=parseInt(p[1]),yy=parseInt(p[2])
  if(!dd||!mm||!yy||yy<1900||yy>2100||mm<1||mm>12||dd<1||dd>31) return null
  return {dd,mm,yy}
}

function optNeedsFill(optText){ return (optText||'').trim()==='Khác' }

// ───────── Render nút chủ đề ─────────
function renderTopicSelector(){
  const btnHost=document.getElementById('topic-buttons'); if(!btnHost) return
  const cur=window.__lastTopic||''
  btnHost.innerHTML=Object.entries(TOPIC_LABELS).map(([k,v])=>`
    <button onclick="selectTopic('${k}')" style="padding:8px 14px;border-radius:8px;border:1px solid ${cur===k?'#6a3aaa':'#ccc'};background:${cur===k?'#6a3aaa':'#f6f0fc'};color:${cur===k?'#fff':'#4a3a6a'};font-size:.74rem;font-weight:600;cursor:pointer">${v}</button>
  `).join('')
}
function selectTopic(topic){
  window.__lastTopic=topic
  renderTopicSelector()
  renderQuestionForm(topic)
  const btn=document.getElementById('btn-next'); if(btn) btn.style.display='block'
}

// ───────── Khối Profile nền tảng (hỏi 1 lần) ─────────

  const host=document.getElementById('profile-form'); if(!host) return
  const saved=window.__profile||{}
  let html=`<div style="background:#eef6f0;border:1px solid #cfe6d5;border-radius:8px;padding:11px 12px;margin-bottom:12px">

  PROFILE_Q.forEach((q,qi)=>{
    const nm='prof_'+q.key
    html+=`<div style="margin-bottom:9px;padding:8px 10px;background:#fff;border-radius:7px">
      <div style="font-size:.74rem;font-weight:600;color:#333;margin-bottom:6px">${q.text}</div>
      <div style="display:flex;flex-direction:column;gap:3px">`
    q.opts.forEach((opt,i)=>{
      const ck=(saved[q.key]===opt)?'checked':''
      html+=`<label style="font-size:.72rem;color:#444;padding:2px 0;cursor:pointer;display:block">
        <input type="radio" name="${nm}" value="${escapeHtml(opt)}" ${ck} style="margin-right:6px;vertical-align:middle">${opt}</label>`
    })
    html+=`</div></div>`
  })
  html+=`</div>`
  host.innerHTML=html
}
function collectProfile(){
  const p={}
  PROFILE_Q.forEach(q=>{
    const sel=document.querySelector(`input[name="prof_${q.key}"]:checked`)
    if(sel) p[q.key]=sel.value
  })
  window.__profile=p
  window.__sinhDoiSinhSau = (p.sinh_doi==='Có, mình là người sinh sau')
  return p
}

// ───────── Render 1 câu hỏi đa lựa chọn ─────────
function renderOneQ(q, nm){
  let html=`<div style="margin-bottom:11px;padding:9px 11px;background:#faf8fd;border-radius:8px">
      <div style="font-size:.75rem;font-weight:600;color:#333;margin-bottom:6px">${q.text}</div>
      <div style="display:flex;flex-direction:column;gap:4px">`
  q.opts.forEach((opt,i)=>{
    const needFill=optNeedsFill(opt)
    html+=`<label style="font-size:.73rem;color:#444;padding:3px 0;cursor:pointer;display:block">
        <input type="checkbox" name="${nm}" value="${escapeHtml(opt)}" data-optidx="${i}" onchange="onQToggle('${nm}',${i})" style="margin-right:6px;vertical-align:middle">${opt}</label>`
    if(needFill){
      html+=`<input type="text" id="qfill_${nm}_${i}" placeholder="Nêu rõ..." style="display:none;width:100%;font-size:.72rem;padding:6px 9px;margin:2px 0 4px 22px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box;max-width:calc(100% - 22px);color:#333">`
    }
  })
  html+=`</div></div>`
  return html
}
function onQToggle(nm, idx){
  const cb=document.querySelector(`input[name="${nm}"][data-optidx="${idx}"]`)
  const fillEl=document.getElementById('qfill_'+nm+'_'+idx)
  if(fillEl) fillEl.style.display=(cb&&cb.checked)?'block':'none'
}

// ───────── Render 3 khối A/B/C của 1 chủ đề (prefix tách form cá nhân/hợp đôi) ─────────
const KHOI_COLOR={A:'#5a7ec0', B:'#b06a3a', C:'#4a8a5a'}
function renderTopicBlocks(topicKey, prefix){
  const cfg=TOPIC_Q[topicKey]; if(!cfg) return ''
  let html=''
  cfg.khoi.forEach(blk=>{
    html+=`<div style="margin-bottom:12px">
      <div style="font-size:.72rem;font-weight:700;color:${KHOI_COLOR[blk.ma]||'#555'};margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px">${blk.ma}. ${blk.ten}</div>`
    blk.cau.forEach((q,qi)=>{ html+=renderOneQ(q, prefix+topicKey+'_'+blk.ma+qi) })
    html+=`</div>`
  })
  return html
}

  formHost.innerHTML=html
}

// ───────── Thu thập đáp án 1 chủ đề → {id:{khoi,cau,dapAn}} ─────────
function collectTopicAnswers(topicKey, prefix){
  const cfg=TOPIC_Q[topicKey]; const answers={}; if(!cfg) return answers
  cfg.khoi.forEach(blk=>{
    blk.cau.forEach((q,qi)=>{
      const nm=prefix+topicKey+'_'+blk.ma+qi
      const checked=[...document.querySelectorAll(`input[name="${nm}"]:checked`)]
      if(!checked.length) return
      const chosen=checked.map(cb=>{
        const oi=parseInt(cb.dataset.optidx)
        const fillEl=document.getElementById('qfill_'+nm+'_'+oi)
        const fillVal=fillEl?fillEl.value.trim():''
        return cb.value+(fillVal?(' — ghi rõ: '+fillVal):'')
      })
      answers[nm]={ khoi:blk.ma, khoiTen:blk.ten, cau:q.text, dapAn:chosen }
    })
  })
  return answers
}

// Chuyển đáp án sang mảng phẳng cho AI (kèm nhãn thời gian khoi)
function fmtAnswersForAI(answers){
  const KH={A:'Hiện tại', B:'Quá khứ', C:'Định hướng'}
  return Object.values(answers||{}).map(a=>({
    thoiGian: a.khoi?(KH[a.khoi]||a.khoiTen||''):undefined,
    cau:a.cau,
    traLoi: Array.isArray(a.dapAn) ? a.dapAn.join('; ') : String(a.dapAn||'')
  }))
}

// STEP 8B: LUẬN GIẢI BẰNG AI (Claudeception)
// ══════════════════════════════════════════════════
// Gom toàn bộ context lá số thành JSON gọn cho AI
// ═══════════ LẬP CỰC (xoay tâm 12 cung) + TAM GIÁC MẬT MÃ ═══════════
// PAL gốc: palaceMap[moveForward(menhIndex,i)] = PAL[i]. Xoay = đổi mốc Mệnh.
const PAL_ORDER = ['Mệnh','Phụ Mẫu','Phúc Đức','Điền Trạch','Quan Lộc','Nô Bộc','Thiên Di','Tật Ách','Tài Bạch','Tử Tức','Phu Thê','Huynh Đệ'];
function buildFrameLapCuc(newMenhB){ const f={}; for(let i=0;i<12;i++){ f[PAL_ORDER[i]]=moveForward(newMenhB,i); } return f; }
function timBTheoVaiTro(nr, vaiTro){ for(let b=1;b<=12;b++){ if(nr.palaceMap[b]===vaiTro) return b; } return null; }
// 4 bộ Tam Giác theo Questionair3 (biểu diễn bằng VAI TRÒ tương đối Mệnh chủ đề)
const TAM_GIAC_ROLES = {
  menh:     {ten:'Tam Giác Cốt Lõi Mệnh', cung:[['menh','Mệnh'],['tat','Tật Ách'],['kho','Điền Trạch']]},
  quan_loc: {ten:'Tam Giác Mật Mã Quan Lộc', cung:[['menh','Quan Lộc'],['tat','Tài Bạch'],['kho','Phu Thê']]},
  tai_bach: {ten:'Tam Giác Mật Mã Tài Bạch', cung:[['menh','Tài Bạch'],['tat','Tật Ách'],['kho','Huynh Đệ']]},
  tinh_cam: {ten:'Tam Giác Mật Mã Hôn Nhân', cung:[['menh','Phu Thê'],['tat','Thiên Di'],['kho','Nô Bộc']]},
  con_cai:  {ten:'Tam Giác Mật Mã Tử Tức',  cung:[['menh','Tử Tức'],['tat','Huynh Đệ'],['kho','Phụ Mẫu']]}
};
const TAM_GIAC_NHAN = {
  menh:'Mệnh chủ đề — bản chất, tư duy, khát vọng gốc',
  tat:'Tật chủ đề — biểu hiện hành vi / trạng thái thực tế khi lao vào',
  kho:'Tật-của-Tật = Kho chứa nghiệp quả, nền tảng lưu trữ thành quả'
};
function buildTamGiac(nr, topic, canDV, canLN, sinhSau){
  const cfg=TAM_GIAC_ROLES[topic]; if(!cfg) return null;
  const baseB = sinhSau ? (timBTheoVaiTro(nr,'Huynh Đệ')||nr.menhIndex) : nr.menhIndex;
  const frame = buildFrameLapCuc(baseB);
  const ms = window.__movingStars;
  const TL=(()=>{try{return detectTuyetLo(nr)}catch(e){return[]}})();
  const PT=(()=>{try{return detectPhaThe(nr)}catch(e){return[]}})();
  const MK=(()=>{try{return detectMoKho(nr,nr.ys,canDV,canLN,ms)}catch(e){return[]}})();
  const ENV=(()=>{try{return detectEnvironmentStatus(nr,canDV,canLN)}catch(e){return{thatDia:[],thatThien:[],thatNhan:[],hamTri:[]}}})();
  const TH=(()=>{try{return detectTuHoa(nr)}catch(e){return{}}})();
  const nhanAt=(b)=>{ const role=nr.palaceMap[b]; const out=[];
    TL.filter(x=>x.cungChuc===role).forEach(()=>out.push('TUYỆT_LỘ_KHÔNG_VONG'));
    PT.filter(x=>x.cungChuc===role).forEach(x=>out.push('PHÁ_THẾ'+(x.type?' ('+x.type+')':'')));
    MK.filter(x=>x.cungChuc===role).forEach(x=>out.push('MỘ_KHỐ:'+(x.status||x.loai||'')));
    ENV.thatDia.filter(x=>x.cungChuc===role).forEach(()=>out.push('THẤT_ĐỊA'));
    ENV.thatThien.filter(x=>x.cungChuc===role).forEach(()=>out.push('THẤT_THIÊN'));
    ENV.thatNhan.filter(x=>x.cungChuc===role).forEach(()=>out.push('THẤT_NHÂN'));
    ENV.hamTri.filter(x=>x.cungChuc===role).forEach(()=>out.push('HÀM_TRÌ'));
    return out; };
  const luuName=(s)=>{ if(!s||!s.name)return null; if(s.name.startsWith('ĐV.'))return 'Đại vận '+s.name.slice(3); if(s.name.startsWith('L.'))return 'Lưu niên '+s.name.slice(2); return s.name; };
  const node=([key,role])=>{ const b=frame[role];
    const thNatal=(TH[b]||[]).map(x=>(x.tuHoa?x.tuHoa:('Hóa '+x.hoaType))+' ('+x.star+')');
    return { vaiTro:TAM_GIAC_NHAN[key], vaiTroChuDe:role, cungGoc:nr.palaceMap[b], cungChi:chiName(b),
      chinhTinh:nr.mainStarsByPalace[b]||[], phuTinh:nr.subStarsByPalace[b]||[],
      saoLuu:(ms?.luuStarsByPalace?.[b]||[]).map(luuName).filter(Boolean), tuHoaGoc:thNatal, nhan:nhanAt(b) }; };
  return { ten:cfg.ten,
    lapCuc: sinhSau?'NGƯỜI SINH SAU — đã xoay tâm về cung Huynh Đệ bẩm sinh làm Mệnh đời thực':'Mệnh gốc (không xoay)',
    menhChuDe:node(cfg.cung[0]), tatChuDe:node(cfg.cung[1]), khoChuDe:node(cfg.cung[2]) };
}

// ───────── TỔNG QUAN: 4 tam giác lập cực (Mệnh + Quan + Tài + Tình) ─────────
function buildTongQuan(nr, canDV, canLN, sinhSau){
  const mang=[
    {ten:'Cốt lõi Mệnh', topic:'menh'},
    {ten:'Sự nghiệp (Quan Lộc)', topic:'quan_loc'},
    {ten:'Tài chính (Tài Bạch)', topic:'tai_bach'},
    {ten:'Tình cảm (Hôn Nhân)', topic:'tinh_cam'}
  ]
  return mang.map(m=>({ mang:m.ten, tamGiac: buildTamGiac(nr, m.topic, canDV, canLN, sinhSau) }))
}

// ───────── VẬN HẠN NHIỀU NĂM (Lưu Niên tới hết đại hạn) ─────────
// Mỗi năm: địa chi năm → Mệnh Lưu Niên; can năm → phi Lưu Tứ Hóa; quét chập 3 tầng → gán nhãn đỉnh/đáy/tích lũy.
function buildVanHanCacNam(nr, transit){
  if(!nr||!transit||!transit.daiHan) return null
  const dh=transit.daiHan
  const birthY=nr.debug?.lunarYear
  const startY=transit.targetYear
  let endY=(typeof birthY==='number'&&typeof dh.endAge==='number')?(birthY+dh.endAge-1):(startY+((dh.namConLai||10)-1))
  if(endY<startY) endY=startY+9
  if(endY-startY>12) endY=startY+12
  const findPal=(star)=>{ if(!star) return null
    for(let i=1;i<=12;i++){ if(nr.mainStarsByPalace[i]?.includes(star)) return i
      if(nr.subStarsByPalace[i]?.some(s=>s===star||s.startsWith(star))) return i } return null }
  const kyStarOf =(can)=>{ const m=TU_HOA_MAP[can]||{}; return Object.keys(m).find(s=>m[s]==='Hóa Kỵ')||null }
  const locStarOf=(can)=>{ const m=TU_HOA_MAP[can]||{}; return Object.keys(m).find(s=>m[s]==='Hóa Lộc')||null }
  const natalKyB=findPal(kyStarOf(nr.ys))
  const canDVlocal=nr.canMap?.[chiIdx(dh.cung)]
  const dvKyB=findPal(kyStarOf(canDVlocal))
  let ENV={thatDia:[],thatThien:[],thatNhan:[],hamTri:[]}
  try{ ENV=detectEnvironmentStatus(nr, canDVlocal, transit.transitYS||nr.ys) }catch(e){}
  const thatHamRoles=new Set([...ENV.thatDia,...ENV.thatThien,...ENV.thatNhan,...ENV.hamTri].map(x=>x.cungChuc))
  const cac_nam=[]
  for(let Y=startY; Y<=endY; Y++){
    const canY=getYearStem(Y)
    const yB=getYearBranchIdx(Y)
    const menhLuuNien=nr.palaceMap[yB]
    const kyB=findPal(kyStarOf(canY))
    const locB=findPal(locStarOf(canY))
    const kyRole=kyB?nr.palaceMap[kyB]:null
    const trungGoc = kyB!==null && kyB===natalKyB
    const trungDV  = kyB!==null && kyB===dvKyB
    const trungThat= kyB!==null && thatHamRoles.has(kyRole)
    const trungKy=trungGoc||trungDV||trungThat
    let nhan, lyDo
    if(trungKy){
      nhan='NĂM_XUNG_KÍCH_LEVEL_3'
      const ds=[]; if(trungGoc)ds.push('trùng điểm yếu bẩm sinh'); if(trungDV)ds.push('trùng điểm yếu của vận 10 năm'); if(trungThat)ds.push('rơi vào vùng tổn hao')
      lyDo='Dòng khí xấu của năm dồn vào khu vực "'+kyRole+'" — '+ds.join(', ')+'. Năm cần thủ thế, dễ có biến cố.'
    } else if(locB!==null){
      nhan='NĂM_BUNG_SỨC_PHÁT_TÀI'
      lyDo='Dòng khí tốt của năm rọi vào khu vực "'+nr.palaceMap[locB]+'", không vướng chập xấu — cửa mở để bứt phá, mở rộng.'
    } else {
      nhan='NĂM_TÍCH_LŨY'
      lyDo='Năm không chập xấu cũng chưa có cú hích lớn — giai đoạn bồi đắp, đi chắc từng bước.'
    }
    cac_nam.push({ nam:Y, can:canY, menhLuuNien, khiXauVao:kyRole, khiTotVao:(locB?nr.palaceMap[locB]:null), nhan, lyDo })
  }
  return { tuNam:startY, denNam:endY, cungDaiHan:dh.cung, cac_nam }
}

  // Tiền tố đã làm rõ: 'Lưu niên ...' = dòng khí năm; 'Đại vận ...' = dòng khí 10 năm; 'Lưu ...' = sao lưu cố định năm.
  const __ms=window.__movingStars
  const __luuName=(s)=>{
    if(!s||!s.name) return null
    if(s.name.startsWith('ĐV.')) return 'Đại vận '+s.name.slice(3)
    if(s.name.startsWith('L.'))  return 'Lưu niên '+s.name.slice(2)
    return s.name
  }
  const cungData={}
  for(let b=1;b<=12;b++){
    cungData[chiName(b)]={
      cungChucNang:nr.palaceMap[b],
      can:nr.canMap?.[b],
      chinhTinh:nr.mainStarsByPalace[b]||[],
      phuTinh:nr.subStarsByPalace[b]||[],
      saoLuu:(__ms?.luuStarsByPalace?.[b]||[]).map(__luuName).filter(Boolean),
    }
  }
  // Cung đối (xung chiếu) + tam phương của 1 cung (theo branchIdx 1-12)
  const oppIdx=(bi)=>((bi-1+6)%12)+1
  const tamPhuong=(bi)=>[((bi-1+4)%12)+1, ((bi-1+8)%12)+1]  // cách 4 và 8
  const cungInfoAt=(bi)=>({cung:chiName(bi), chucNang:nr.palaceMap[bi], chinhTinh:nr.mainStarsByPalace[bi]||[]})
  // tìm branchIdx của 1 tên cung chức năng
  const findBranch=(ten)=>{ for(const[bi,n]of Object.entries(nr.palaceMap)) if(n===ten) return +bi; return null }

  const menhBi=nr.menhIndex
  const answers=window.__answers||{}
  // Gom đáp án thành mảng dễ đọc cho AI (đa lựa chọn → nối bằng '; ')
  const dapAn19Cau=fmtAnswersForAI(answers)

  return {
    chuDeDangXem:TOPIC_LABELS[topic],
    namXem:`${t.targetYear} ${t.transitYB}`,
    // Ma trận luận giải — engine ĐÃ lọc đúng chủ đề khách chọn (trọng số cung + bộ lọc nhãn + bốc thuốc)
    maTranLuanGiai: getMaTranChuDe(topic),
    // Tam Giác / Tổng Quan — engine ĐÃ lập cực (coi cung chủ đề là Mệnh) → tính sẵn, AI khỏi đếm cung

    hoanCanhThucTe:{

    laSo:{
      menh:chiName(nr.menhIndex), than:chiName(nr.thanIndex),
      cuc:nr.cucName, napAm:nr.napAm?.n,
      namSinh:`${nr.ys} ${nr.yb}`, gioiTinh:nr.input.gender, amDuong:nr.amDuong,
      cung:cungData
    },
    // ── Cốt lõi con người (luận TRƯỚC khi sang chủ đề) ──
    cotLoiMenh:{
      cungMenh:cungInfoAt(menhBi),
      cungDoiMenh:cungInfoAt(oppIdx(menhBi)),   // Thiên Di — môi trường, người khác nhìn vào
      tamPhuongMenh:tamPhuong(menhBi).map(cungInfoAt),  // Tài Bạch + Quan Lộc thường
      cungThan:cungInfoAt(nr.thanIndex),
      cungPhucDuc:(findBranch('Phúc Đức')!=null)?cungInfoAt(findBranch('Phúc Đức')):null,
      cungTatAch:(findBranch('Tật Ách')!=null)?cungInfoAt(findBranch('Tật Ách')):null
    },
    daiHan:{
      hienTai:{cung:t.daiHan.cung, cungChucNang:nr.palaceMap[chiIdx(t.daiHan.cung)]||null, tuoi:`${t.daiHan.startAge}-${t.daiHan.endAge}`, namThu:t.daiHan.namThu},
      // TẤT CẢ đại hạn (12 giai đoạn 10 năm) — để AI luận đúng cả vận cũ/đang/sắp tới
      tatCa:(window.__engine?buildDaiHanList(window.__engine):[]).map(dh=>({
        cung:dh.cung,
        cungChucNang:nr.palaceMap[chiIdx(dh.cung)]||null,
        tuoi:`${dh.startAge}-${dh.endAge}`,
        nam:`${dh.startYear}-${dh.endYear}`,
        dangXet:(t.targetYear>=dh.startYear && t.targetYear<=dh.endYear)
      }))
    },
    luuNguyet:{cung:t.luuNguyet, canThang:t.canThang, thang:t.targetMonth},
    trungPhung:t.trungPhung?{
      daiVan:t.trungPhung.daiVanByPalace, luuNien:t.trungPhung.luuNienByPalace
    }:null,
    tuHoaVaCham:window.__tuHoaConflicts?.conflicts||[],
    luuHoaBayVaoCung:(window.__luuHoaFlights||[]).map(f=>({
      hoa:f.hoaType, sao:f.star, cung:chiName(f.palaceIdx),
      cungGoc:f.gocCung, cungDaiVan:f.daiVanCung, mucDo:f.level
    })),
    // ── Step 8D: 3 logic nâng cao ──
    laiNhanCung:findLaiNhanCung(nr).map(l=>({cung:l.cung, cungChucNang:l.cungChucNang})),
    tuHoa:Object.entries(detectTuHoa(nr)).map(([bi,arr])=>({
      cung:chiName(+bi), cungChucNang:nr.palaceMap[+bi], cac:arr.map(x=>x.tuHoa+' ('+x.star+')')
    })),
    quyDaoHanNam:buildQuyDao(nr, transitYS_for8d()),
    quyDaoTuThan:buildQuyDaoTuThan(nr),
    // Tầng 2B: Mộ Khố — Nhập Kho / Mở Kho
    moKho:(()=>{
      const canDV=nr.canMap[chiIdx(window.__transit?.daiHan?.cung||'')]
      const canLN=window.__transit?.transitYS||nr.ys
      return detectMoKho(nr, nr.ys, canDV, canLN, window.__movingStars).map(mk=>({
        cungChuc:mk.cungChuc, loai:mk.loai, chi:mk.chi,
        nhapKhoTu:mk.nhapKhoTangs.map(t=>t.tang+': '+t.starName+' '+t.hoaType),
        status:mk.status, triggerReasons:mk.triggerReasons, coach:mk.coach
      }))
    })(),
    // Phá Thế — lỗi cấu trúc hình học bẩm sinh
    phaThe:(()=>detectPhaThe(nr).map(p=>({cungChuc:p.cungChuc,type:p.type,lyDo:p.lyDo,coach:p.coach})))(),
    // Module Kỵ Xuất / Lộc Xuất
    kyXuat:(()=>detectKyXuat(nr).map(k=>({cungChuc:k.cungChuc,star:k.star,status:k.status,doiCungChuc:k.doiCungChuc,coach:k.coach})))(),
    // Module Ứng Kỳ — tháng nổ biến cố
    ungKy:(()=>{
      const td=window.__tamDiem||[]
      return detectUngKy(td, window.__transit?.targetYear||new Date().getFullYear()).map(u=>({
        cungChuc:u.cungChuc, level:u.level,
        thangChinh:u.thangChinhStr, thangPhu:u.thangPhuStr, nam:u.nam, coach:u.coach
      }))
    })(),
    // Module Khí Khâu — vùng đổi vận
    khiKhau:(()=>{
      const kk=window.__khiKhau
      if(!kk) return null
      return {status:kk.status, namConLai:kk.namConLai, endYear:kk.endYear,
        nextDV:kk.nextDV, nextHoaList:kk.nextHoaList, coach:kk.coach}
    })(),
    // Module Thất Bộ Ba + Hàm Trì
    envStatus:(()=>{
      const canDV=nr.canMap[chiIdx(window.__transit?.daiHan?.cung||'')]
      const canLN=window.__transit?.transitYS||nr.ys
      const e=detectEnvironmentStatus(nr, canDV, canLN)
      return {
        thatDia:  e.thatDia.map(x=>({cungChuc:x.cungChuc,star:x.star,subtype:x.subtype,lyDo:x.lyDo})),
        thatThien:e.thatThien.map(x=>({cungChuc:x.cungChuc,type:x.type,lyDo:x.lyDo})),
        thatNhan: e.thatNhan.map(x=>({cungChuc:x.cungChuc,tang:x.tang,star:x.star,lyDo:x.lyDo})),
        hamTri:   e.hamTri.map(x=>({cungChuc:x.cungChuc,lyDo:x.lyDo,coach:x.coach}))
      }
    })(),
    tamDiem:(()=>{
      const canDV=nr.canMap[chiIdx(window.__transit?.daiHan?.cung||'')]
      const canLN=window.__transit?.transitYS||nr.ys
      const tl=detectTuyetLo(nr)
      const mk=detectMoKho(nr, nr.ys, canDV, canLN, window.__movingStars)
      const pt=detectPhaThe(nr)
      return detectTamDiemTrungPhung(nr, canDV, canLN, tl, mk, pt).map(td=>({
        level:td.level, cungChuc:td.cungChuc, tangBH:td.tangBH,
        headline:td.headline, detail:td.detail, coach:td.coach,
        baseStatuses:td.baseStatuses.map(s=>s.label),
        hasRemedy:!!td.remedy
      }))
    })(),
    hoaKhoa:(()=>{
      const canDV=nr.canMap[chiIdx(window.__transit?.daiHan?.cung||'')]
      const canLN=window.__transit?.transitYS||nr.ys
      return detectHoaKhoa(nr, canDV, canLN).map(hk=>({
        tang:hk.tang, can:hk.can, saoKhoa:hk.saoKhoa,
        cungDap:hk.cungDap, coaching:hk.coaching
      }))
    })(),
    // Tầng 2: Tuyệt Lộ — cung bị ngắt cầu dao tổng
    tuyetLo:(()=>detectTuyetLo(nr).map(tl=>({
      cungChuc:tl.cungChuc, toaDo:tl.toaDoStr,
      trangThai:tl.dangerLevel, lyGiai:tl.lyGiai,
      kyRot:tl.kyInPalace, coaching:tl.coaching
    })))(),
    // Lưu Nhật: các ngày biến động mạnh tới hết tháng âm
    luuNhatBienDong: (()=>{
      try{
        const p=parseDMY(document.getElementById('target-date')?.value||'')
        if(p) return buildLuuNhatThang(nr, t, p.dd, p.mm, p.yy, true)
      }catch(e){ console.error('luuNhat err',e) }
      return []
    })(),
    // Lưu Nguyệt 12 tháng: cho chủ đề lẻ — tháng nào tốt/xấu cho lĩnh vực này
    luuNguyet12Thang: (topic!=='Tong_quan_thang' && window.__engine) ? (()=>{
      try{ return buildLuuNguyet12Thang(nr, t, window.__engine) }
      catch(e){ console.error('luuNguyet12 err',e); return undefined }
    })() : undefined,
    // ══════════════════════════════════════════════════
    // DANH SÁCH CẢNH BÁO GỘP — mọi "thế" engine bắt được, gom 1 chỗ để AI KHÔNG bỏ sót.
    // thuocChuDe=true → mổ sâu ở Phần 3; false → đưa vào Phần 2 (mớm cung ẩn).
    // ══════════════════════════════════════════════════
    canhBaoCungAn:(()=>{
      const canDV=nr.canMap[chiIdx(window.__transit?.daiHan?.cung||'')]
      const canLN=window.__transit?.transitYS||nr.ys
      const year=window.__transit?.targetYear||new Date().getFullYear()
      const DOMAIN_HINT={
        'Mệnh':'bản thân, tính cách, lựa chọn của chính mình',
        'Phụ Mẫu':'cấp trên / cha mẹ / giấy tờ, bằng cấp',
        'Phúc Đức':'tinh thần, phúc khí, sự an yên, hưởng thụ',
        'Điền Trạch':'nhà cửa, đất đai, tài sản, kho tiền của chìm',
        'Quan Lộc':'công việc, sự nghiệp',
        'Nô Bộc':'bạn bè, đồng nghiệp, người ngang hàng',
        'Thiên Di':'ra ngoài, đi xa, môi trường sống, quý nhân',
        'Tật Ách':'sức khỏe, áp lực dồn nén bên trong',
        'Tài Bạch':'tiền bạc, dòng tiền mặt',
        'Tử Tức':'con cái, cấp dưới, thành quả mình tạo ra',
        'Phu Thê':'vợ/chồng, người yêu, hôn nhân',
        'Huynh Đệ':'anh chị em, người thân, dòng vốn chung'
      }
      const TOPIC_CUNG={quan_loc:['Quan Lộc'],tai_bach:['Tài Bạch'],tinh_cam:['Phu Thê'],con_cai:['Tử Tức']}
      const wholeChart=(topic==='Tong_quan_thang'||topic==='van_han')
      const topicCung=TOPIC_CUNG[topic]||[]
      const dom=(cc)=>DOMAIN_HINT[cc]||cc||'(không rõ)'
      const out=[]
      const push=(theLoai,linhVuc,mucDo,giaiThich,coach)=>{
        out.push({
          theLoai, linhVuc:linhVuc||'(không rõ)', linhVucDoiThuong:dom(linhVuc),
          mucDo, thuocChuDe: wholeChart ? true : topicCung.includes(linhVuc),
          giaiThich:giaiThich||'', coach:coach||null
        })
      }
      // 1) Phi Kỵ năm dồn vào cung xung yếu (warn-flight) — phần engine hay bị bỏ sót nhất
      ;(window.__luuHoaFlights||[]).filter(f=>f.level==='warn').forEach(f=>{
        const lv=f.daiVanCung||f.gocCung
        const ghiChuTang=(f.daiVanCung&&f.gocCung&&f.daiVanCung!==f.gocCung)
          ? ' (vốn là "'+f.gocCung+'", trong giai đoạn 10 năm này mang nghĩa "'+f.daiVanCung+'")' : ''
        push('Luồng bế tắc/hao tổn của NĂM dồn vào đây (Phi Kỵ)', lv, 'cao',
          'Năm nay dòng năng lượng xấu (bế tắc, hao hụt, thị phi) đổ vào lĩnh vực này'+ghiChuTang+'.',
          'Giữ mình ở lĩnh vực này trong năm, đừng mở rộng hay dấn sâu; đề phòng trục trặc với người liên quan, rút lui đúng lúc.')
      })
      // 2) Phá Thế — vết nứt cấu trúc bẩm sinh
      try{ detectPhaThe(nr).forEach(p=>push('Vết nứt cấu trúc bẩm sinh (Phá Thế)', p.cungChuc, 'cao', p.lyDo, p.coach)) }catch(e){}
      // 3) Tuyệt Lộ — vùng ngắt mạch
      try{ detectTuyetLo(nr).forEach(tl=>push('Vùng ngắt mạch năng lượng (Tuyệt Lộ)', tl.cungChuc, 'cao', tl.lyGiai, tl.coaching)) }catch(e){}
      // 4) Mộ Khố — khóa kho / mở kho (TẠI SAO CHƯA MỞ)
      try{ detectMoKho(nr, nr.ys, canDV, canLN, window.__movingStars).forEach(mk=>{
        const moMo=(mk.status==='STORAGE_OPENED')
        push(moMo?'Kho đang MỞ — bung năng lượng (Mộ Khố)':'Kho đang KHÓA — chưa mở (Mộ Khố)', mk.cungChuc,'vừa',
          'Kho ('+mk.loai+') '+(moMo?'đang mở, đây là lúc bung ra.':'đang đóng — năng lượng/của cải tích lại nhưng CHƯA bung ra ngoài.'), mk.coach)
      }) }catch(e){}
      // 5) Lộc Xuất / Kỵ Xuất — rò rỉ năng lượng
      try{ detectKyXuat(nr).forEach(k=>push(
        k.status==='LỘC_XUẤT'?'Lộc bị rò sang nơi khác (Lộc Xuất)':'Năng lượng tiêu tán (Kỵ Xuất)',
        k.cungChuc,'cao','Năng lượng bị đẩy văng sang "'+k.doiCungChuc+'" — khó giữ lại cho mình.', k.coach)) }catch(e){}
      // 6) Ứng Kỳ — điểm rơi biến cố khớp đời thực (tính tamDiem tại chỗ, không phụ thuộc global rỗng)
      let tamDiemArr=[]
      try{
        const tl0=detectTuyetLo(nr), mk0=detectMoKho(nr,nr.ys,canDV,canLN,window.__movingStars), pt0=detectPhaThe(nr)
        tamDiemArr=detectTamDiemTrungPhung(nr,canDV,canLN,tl0,mk0,pt0)
      }catch(e){}
      try{ detectUngKy(tamDiemArr, year).forEach(u=>push('Điểm rơi biến cố — đã ứng vào đời thực (Ứng Kỳ)', u.cungChuc,'cao',
        'Mạch lá số chập đúng bế tắc đã khai báo'+(u.thangChinhStr?(', điểm rơi quanh '+u.thangChinhStr):'')+'.', u.coach)) }catch(e){}
      // 7) Khí Khâu — vùng chuyển giao đại vận
      try{ if(window.__khiKhau){ const kk=window.__khiKhau
        push('Vùng chuyển giao chao đảo cuối một giai đoạn (Khí Khâu)', kk.cungChuc||'Mệnh','vừa',
          'Đang ở lằn ranh cuối một chặng 10 năm — dễ chao đảo tâm lý, mất phương hướng tạm thời.', kk.coach) } }catch(e){}
      // 8) Bộ ba Thất + Hàm Trì
      try{ const e2=detectEnvironmentStatus(nr, canDV, canLN)
        e2.thatDia.forEach(x=>push('Môi trường vật chất lệch pha / chèn ép (Thất Địa)', x.cungChuc,'vừa', x.lyDo, null))
        e2.thatThien.forEach(x=>push('Suy phúc khí, dễ tâm bệnh (Thất Thiên)', x.cungChuc,'cao', x.lyDo, null))
        e2.thatNhan.forEach(x=>push('Tổn hao người thân / người quanh mình (Thất Nhân)', x.cungChuc,'cao', x.lyDo, null))
        e2.hamTri.forEach(x=>push('Vũng lầy tình cảm rò rỉ (Hàm Trì)', x.cungChuc,'cao', x.lyDo, x.coach))
      }catch(e){}
      // 9) Trùng phùng 3 tầng — điểm sụp đổ lớn nhất
      try{ tamDiemArr.forEach(td=>push('Trùng phùng 3 tầng — điểm sụp đổ/biến cố lớn (Level 3)', td.cungChuc,'cao', td.headline||td.detail, td.coach)) }catch(e){}
      return out
    })()
  }
}

const AI_SYSTEM_PROMPT=`# KHÂM THIÊN MÔN BẮC PHÁI – ULTIMATE AI ENGINE

## 1. VAI TRÒ
Bạn là bậc thầy luận giải Tử Vi Bắc Phái (Khâm Thiên Môn) kết hợp tư duy Coaching hiện đại. Bạn đọc lá số như một mạng lưới dòng điện động, đối chiếu câu trả lời khảo sát thực tế của đương số để chẩn đoán vướng mắc đời thực, dự báo thời điểm (Ứng Kỳ) và đưa ra giải pháp hành động.

## 2. NGUYÊN TẮC VẬN HÀNH (BẮC PHÁI CHÍNH THỐNG)

NGUYÊN TẮC 0 — MA TRẬN LUẬN GIẢI: Đọc "maTranLuanGiai" (engine đã lọc sẵn ĐÚNG chủ đề khách xem). Mỗi cung trong "cungVi" có "trongSo" (1/2/3) và "nghia" đã ánh xạ về đúng lĩnh vực — luận theo nghĩa này, không dùng nghĩa cung mặc định. Bốc thuốc theo trọng số ("bocThuoc"): TS1 = BẮT BUỘC mổ sâu thành đoạn chính; TS2 = chỉ luận nếu có DẤU HIỆU DỊ THƯỜNG (Tự Hóa, Song Kỵ, Tuyệt Lộ), không có thì lướt/ẩn cho gọn; TS3 = chỉ làm căn cứ bắc cầu giải thích nguyên nhân sâu xa. Dùng "boLoc" để chốt nghĩa cuối của một ô: nhãn THẤT_NHÂN → con người (con cái/cấp dưới); TUYỆT_LỘ hoặc MỘ_KHỐ + có dòng lưu đập vào → tiền bạc/dự án/góp vốn; HÀM_TRÌ → đời sống tình dục/buông thả. Luôn đối chiếu "hoanCanhThucTe.dapAnKhaiBao" để khóa nghĩa thực tế.

NGUYÊN TẮC 1 — BIỂU HIỆN / NỘI TẠI / NGUYÊN NHÂN (đọc "cotLoiMenh"):
- Biểu hiện (vỏ bọc xã hội): trục Mệnh – Thiên Di (cungMenh, cungDoiMenh). Cách phóng năng lượng ra ngoài; nếu có Tự Hóa Kỵ tại Mệnh/Di → hay tự mâu thuẫn, phòng thủ; nếu Lộc Xuất → xởi lởi nhưng dễ bị lợi dụng (xem "kyXuat").
- Nội tại (nội tâm nén lại): cung Tật Ách (cungTatAch). Kỵ bẩm sinh đóng Tật → ủ rũ gặm nhấm tổn thương; Quyền bẩm sinh đóng Tật → nóng nảy bộc phát. Đối chiếu đáp án nhóm Hiện tại + Quá khứ.
- Nguyên nhân/nghiệp quả (cái nôi tuổi thơ): Điền Trạch + Phúc Đức (cungPhucDuc). Điền Trạch dính "tuyetLo" hoặc "phaThe" → vết nứt tiềm thức tuổi thơ, gia đình lạnh nhạt (đối chiếu profileNenTang.bo_me + đáp án nhóm Quá khứ). Quả ở Điền Trạch sinh ra Nhân lo âu ở Tật Ách, phóng ra Biểu hiện phòng thủ ở Mệnh.
- LẬP CỰC (cốt lõi): cấu trúc Mệnh→Tật→Tật-của-Tật này KHÔNG chỉ dùng cho cung Mệnh gốc. Khi luận một chủ đề ở Phần 3, phải coi CHÍNH cung chủ đề là "Mệnh" rồi tìm Tật và Tật-của-Tật của nó. Engine đã lập cực sẵn và trả về ở "tamGiacChuDe" — đừng tự đếm cung.

NGUYÊN TẮC 2 — TÁC ĐỘNG MẶT TĨNH: Lai Nhân Cung ("laiNhanCung") nằm ở cung ngoài (Thiên Di/Nô Bộc/Phụ Mẫu/Huynh Đệ) → cả đời bị xã hội/cấp trên chi phối. Quỹ đạo nghiệp/tự thân ("quyDaoHanNam", "quyDaoTuThan"): tuyến Kỵ bẩm sinh chạy từ đâu đập vào đâu. Khuyết tật hình học: "phaThe", "tuyetLo", "moKho" bẩm sinh. Nhãn môi trường ("envStatus": thatDia/thatThien/thatNhan/hamTri).

NGUYÊN TẮC 3 — TÁC ĐỘNG MẶT ĐỘNG TRONG NĂM: Đọc "saoLuu" tại từng cung ("laSo.cung.<chi>.saoLuu") CÙNG "luuHoaBayVaoCung". Lưu Kỵ vào cung = áp lực/tai họa ập xuống; Lưu Lộc = cơ hội/tiền; Lưu Văn Xương/Khúc = giấy tờ, hợp đồng, thị phi lời nói. Trùng phùng & Song Kỵ ("tamDiem", "tuHoaVaCham"): Lưu Kỵ năm bay trúng cung đã có Kỵ bẩm sinh/Kỵ đại vận → chập mạch Level 3 (biến cố thật); Lưu Kỵ xung cung có Lộc bẩm sinh → chiến tranh năng lượng. Phá thế & kho ("phaThe", "moKho", Thìn-Tuất-Sửu-Mùi): bị xung + Lưu Lộc/Quyền = MỞ KHO phát tài; chỉ Lưu Kỵ đè = VỠ KHO kẹt tiền. Phi xung ("kyXuat"): Kỵ Xuất/Lộc Xuất bắn sang đối cung — "Kỵ xung tối hung".

NGUYÊN TẮC 4 — ĐỘNG LÊN NỘI TẠI: Khí Khâu ("khiKhau" khác null) → đứng cuối Đại vận, chao đảo đổi pha tâm lý. Phi Kỵ lưu niên bắn trúng Tật Ách → nghẽn mạch cảm xúc, stress/trầm cảm dù ngoài mặt vẫn gồng.

NGUYÊN TẮC 5 — XUNG KÍCH TRÙNG PHÙNG (động chạm tĩnh), luận 4 bước: B1 Gọi tên bẫy cố định (vết nứt bẩm sinh của cung chủ đề: Tuyệt Lộ, Phá Thế, kho khóa, Tự Hóa Kỵ, nhãn 3 Thất...). B2 Mô tả dòng động lao vào ("tamDiem", "luuHoaBayVaoCung"). B3 Khớp đời thực = Ứng Kỳ ("ungKy"): đối chiếu trực tiếp đáp án khảo sát chứng minh mạch điện đã ứng vào đời thực. B4 Thuốc giải Hóa Khoa ("hoaKhoa"): Giải Động (việc làm ngay trong năm, bám đáp án nhóm Định hướng — khối C) + Giải Tĩnh (chữa gốc nghiệp ở Điền Trạch/Tật Ách). LƯU Ý: mọi ví dụ hội thoại trong tài liệu gốc CHỈ để bạn hình dung phong cách; khi viết thật phải dịch hết sang lời đời thường, TUYỆT ĐỐI không để lọt tên sao/thuật ngữ.

NGUYÊN TẮC 6 — CẢNH BÁO PHẠM VI KHÁC: Đọc "canhBaoCungAn" (engine đã tính sẵn mọi thế khó). Mục "thuocChuDe": false → đưa vào Phần 2. Đây là checklist BẮT BUỘC, đừng tự suy lại.

NGUYÊN TẮC 7 — LƯU NGUYỆT (Phần 4): đọc "luuNguyet12Thang" xếp hạng tháng cát/hung.
NGUYÊN TẮC 8 — LƯU NHẬT (Phần 5): đọc "luuNhatBienDong" chọn ngày lành/né ngày xấu.
(Tổng quan vận hạn nhiều năm — đồ thị Bung Sức/Phòng Thủ/Tích Lũy — thuộc CHỦ ĐỀ RIÊNG chưa kích hoạt; KHÔNG tự luận phần này khi chủ đề hiện tại không phải Vận Hạn.)

Bảng tra trường JSON (sao chỉ để BẠN hiểu ngầm):
- "tamDiem" Trùng Phùng 3 Tầng: giao thoa Kỵ Bẩm sinh–Đại vận–Lưu niên → điểm sụp đổ.
- "phaThe": cung lục xung bẩm sinh với địa chi năm sinh, hoặc bị Tự Hóa Kỵ/Quyền từ đối cung bẻ gãy.
- "tuyetLo" Tuyệt Lộ Không Vong: vùng ngắt kết nối, đóng băng mạch khí cung vị.
- "moKho" (Thìn/Tuất/Sửu/Mùi): kho tiền. STORAGE_LOCKED = khóa kẹt tiền; STORAGE_OPENED = mở bung.
- "kyXuat": năng lượng rò rỉ hoặc lộc phóng thẳng sang đối cung.
- "envStatus": Thất Địa (lệch pha vật chất), Thất Nhân (tổn hao lục thân), Thất Thiên (suy phúc khí/tâm bệnh), Hàm Trì (rò rỉ tình cảm).
- "khiKhau": vùng đổi pha cuối Đại vận (chao đảo, mất phương hướng).
- "ungKy": điểm rơi mạch điện chập khớp bế tắc đời thực đã khai báo.
- "hoaKhoa": kênh quý nhân/giải pháp tháo gỡ.
- "luuNguyet12Thang", "luuNhatBienDong": quét cát hung từng tháng/ngày.
- "laSo.cung.<chi>.saoLuu": dòng khí ĐỘNG phủ lên cung trong năm xét, đọc CÙNG chinhTinh/phuTinh (sao gốc tĩnh). "Lưu niên Hóa ..." = khí của năm; "Đại vận Hóa ..." = khí của 10 năm; "Lưu Văn Xương/Khúc" = giấy tờ/hợp đồng/thị phi; "Lưu Lộc Tồn/Thiên Mã/Khôi Việt" = sao lưu năm. Cung có Kỵ gốc (xem "tuHoa") + "Đại vận Hóa Kỵ" + "Lưu niên Hóa Kỵ" chồng nhau = tọa độ Trùng Phùng.
- "tamGiacChuDe": engine ĐÃ lập cực (coi cung chủ đề là Mệnh) và tính sẵn 3 tọa độ: "menhChuDe" (bản chất gốc của chủ đề), "tatChuDe" (hành vi/biểu hiện thực tế), "khoChuDe" (Tật-của-Tật = kho chứa nghiệp quả). Mỗi tọa độ có sẵn chinhTinh/phuTinh/saoLuu/tuHoaGoc/nhan. BẠN KHÔNG tự đếm cung — chỉ đọc 3 tọa độ này. Trường "lapCuc" cho biết đã xoay tâm hay chưa; "cungGoc" cho biết tọa độ đó rơi vào cung nào trên lá số.

## 3. NGUYÊN TẮC NGÔN NGỮ (BẮT BUỘC)
- Người đọc KHÔNG biết gì về tử vi. TUYỆT ĐỐI không bắt họ hiểu thuật ngữ.
- CẤM nhắc TÊN SAO trong bài (Tử Vi, Thiên Cơ, Thái Dương, Vũ Khúc, Thiên Đồng, Liêm Trinh, Thiên Phủ, Thái Âm, Tham Lang, Cự Môn, Thiên Tướng, Thiên Lương, Thất Sát, Phá Quân, Tả Phụ, Hữu Bật, Văn Xương, Văn Khúc, Lộc Tồn, Kình Dương, Đà La, Hỏa Tinh, Linh Tinh, Địa Không, Địa Kiếp và mọi tên sao khác). JSON cho tên sao chỉ để BẠN hiểu ngầm.
- CẤM từ chuyên môn khi dùng như thuật ngữ: Hóa Kỵ/Lộc/Quyền/Khoa, xung, trùng phùng, cung Tật, Đại Vận, Lưu Niên, chính tinh, tam hợp, Mệnh/Quan Lộc/Tài Bạch... (Được nói "công việc", "tiền bạc", "tình cảm", "sức khỏe" như từ đời thường.)
- Xưng hô thân mật: gọi đương số là "bồ", tự xưng "mình". Văn phong sâu sắc, thấu hiểu, hiện đại như một người bạn từng trải.
- Đối chiếu "hoanCanhThucTe.dapAnKhaiBao" để neo lời luận vào đúng hoàn cảnh thật — cùng lá số nhưng hoàn cảnh khác thì luận phải khác. Chỉ dùng câu hỏi nào CÓ trong dapAnKhaiBao. Mỗi đáp án có "thoiGian": Hiện tại (đổi mặt nạ nghĩa cung), Quá khứ (khớp vết xước/nghiệp), Định hướng (chọn thuốc Hóa Khoa) — dùng đúng vai từng nhóm ở Tầng 2 Phần 3.
- "hoanCanhThucTe.profileNenTang" là bối cảnh nền (nơi ở → trục Mệnh-Di; quan hệ bố mẹ → cung Phụ Mẫu; nhà đất → Điền Trạch; sinh đôi). Dùng để khóa/mở nghĩa cung nền trước khi luận.
- "hoanCanhThucTe.vanDeQuanTam" là điều đương số TỰ NHẬP và quan tâm nhất. Trả lời THẲNG vào điều này xuyên suốt bài; nếu trống "(không nhập)" thì bám chủ đề đang xem.
- TÌNH TRẠNG ≠ NGÀNH NGHỀ: nếu câu "Bạn hiện đang" là "Nội trợ"/"Thất nghiệp"/"Đi học" thì đó là TÌNH TRẠNG sống hiện tại, KHÔNG phải nghề muốn theo. Khi mâu thuẫn, lấy TÌNH TRẠNG làm chuẩn.
- Câu "vấn đề công việc đến từ ai" dành cho người ĐANG hoặc ĐÃ TỪNG đi làm. Nếu họ trả lời dù đang thất nghiệp/nội trợ, hiểu là môi trường họ TỪNG trải — đừng bắt bẻ mâu thuẫn.
- Mỗi câu khảo sát có thể chọn NHIỀU đáp án (ngăn bằng "; "). Nhiều đáp án = bức tranh đa chiều, luận tổng hợp.

## 4. CẤU TRÚC BÀI LUẬN — ĐỦ 5 PHẦN, KHÔNG BỎ SÓT

### PHẦN 1: BẢN CHẤT GỐC GÁC NỘI TẠI
Áp Nguyên tắc 1 + 2 cho cung Mệnh: trục Mệnh–Di (tính cách bề nổi, cách tương tác xã hội), Tật Ách (áp lực nén, cơ chế phòng vệ), Điền Trạch/Phúc Đức (tuổi thơ, gia đình lớn). Nếu đang Khí Khâu (khiKhau khác null): chỉ rõ chao đảo hiện tại. Đối chiếu đáp án nhóm Hiện tại/Quá khứ và profileNenTang (quan hệ bố mẹ) để bóc căn nguyên hành vi.

### PHẦN 2: "MỚM" CUNG VỊ ẨN (CẢNH BÁO)
- Đọc "canhBaoCungAn", nêu các mục "thuocChuDe": false (ngoài gói đang xem), ưu tiên "mucDo":"cao". Mỗi mục dịch sang đời thường: lĩnh vực nào ("linhVucDoiThuong"), đang dính thế gì, vì sao đáng lo — KHÔNG nói tên thế kỹ thuật.
- Cùng một ô có thể vừa nghĩa gốc vừa nghĩa hiện tại: nếu "giaiThich" ghi "vốn là... nay mang nghĩa...", ưu tiên nghĩa HIỆN TẠI.
- Viết kiểu chỉ điểm, KHÔNG luận sâu: "Gói hôm nay bồ xem là [tên gói], mình mổ kỹ ở dưới. Nhưng phải cảnh báo: [lĩnh vực ẩn] của bồ năm nay có dấu hiệu [rò rỉ/bế tắc/dễ sụp đổ] rõ, đáng lo hơn cả chủ đề đang xem. Bồ cần soi kỹ phần này bằng một lượt quét riêng. Tạm thời chưa luận sâu, nhưng phải hết sức thủ thế nhé!"
- Nếu không có mục thuocChuDe=false đáng kể → nói ngắn gọn các lĩnh vực khác năm nay tương đối ổn.

### PHẦN 3: LUẬN GIẢI CHỦ ĐỀ CHÍNH (DEEP DIVE) — THEO TAM GIÁC MẬT MÃ
QUAN TRỌNG: luận chủ đề phải LẬP CỰC — coi cung chủ đề là Mệnh, đọc bộ ba "tamGiacChuDe" (menhChuDe / tatChuDe / khoChuDe) mà engine đã tính sẵn. KHÔNG luận cung chủ đề đơn lẻ. Tiến hành 2 tầng:

TẦNG 1 — BẢN THỂ TĨNH (phần cứng bẩm sinh): quét sao + "nhan" + "tuHoaGoc" tại 3 tọa độ:
- "menhChuDe": bản chất, tư duy, khát vọng gốc của chủ đề. (Có Kỵ gốc → cuồng/bất an; có Khoa gốc → lý trí, có quý nhân.)
- "tatChuDe": biểu hiện hành vi khi lao vào thực tế. (Có Sát tinh / THẤT_ĐỊA → nóng nảy, ôm đồm, tự bào mòn thể xác.)
- "khoChuDe" (Tật-của-Tật, kho nghiệp): nền tảng lưu trữ thành quả. (Có TUYỆT_LỘ_KHÔNG_VONG / MỘ_KHỐ bị phá → két thủng, thành quả rò rỉ, "đầu voi đuôi chuột", duyên/tiền/nghiệp dễ đứt gãy giữa chừng.)

TẦNG 2 — KÍCH HOẠT ĐỘNG (lồng đáp án khảo sát + can năm, để KHÔNG nói dập khuôn):
- Đổi mặt nạ theo HIỆN TRẠNG: đối chiếu nhóm câu HIỆN TẠI để khóa/mở nghĩa cung. Nếu hoàn cảnh thực tế khác nghĩa gốc (vd đang ở nhà học thi, không đi làm) thì TUYỆT ĐỐI không phán theo nghĩa mặc định (vd "bị sếp đuổi"); dịch sang đúng đời thực ("áp lực tự thân khi học thi").
- Khớp VẾT XƯỚC QUÁ KHỨ: khi dòng Lưu Kỵ năm đập trúng tọa độ tam giác trùng với tổn thương quá khứ user khai → bật cảnh báo "lịch sử lặp lại", nhắc né đúng cái bẫy cũ.
- Bốc thuốc theo ĐỊNH HƯỚNG TƯƠNG LAI: dùng Hóa Khoa ("hoaKhoa") làm la bàn, chỉ đường khớp mong muốn user (bứt phá / hàn gắn / buông bỏ / tích lũy...). Nếu định hướng đi ngược dòng khí năm (vd muốn xuống tiền lớn khi kho đang vỡ) thì "phanh" lại, đề xuất thủ thế.
- Nếu "lapCuc" báo NGƯỜI SINH SAU: mở đầu Phần 3 ghi nhận vị thế "Vì bồ là người sinh sau trong cặp sinh đôi, lá số đời thực của bồ xoay theo một trục khác..." rồi luận trên tam giác ĐÃ xoay (cungGoc cho biết tọa độ thật).

Kết hợp các nguồn bổ trợ:
- Áp "maTranLuanGiai": cung TS1 mổ sâu thành đoạn chính; TS2 chỉ luận nếu có dị thường; TS3 bắc cầu. Dùng "boLoc" + đáp án khảo sát chốt nghĩa từng ô.
- Mổ kỹ TỪNG mục "thuocChuDe": true trong "canhBaoCungAn": đang dính thế khó nào, TẠI SAO (kho chưa mở thì nói rõ vì sao), lối ra (ưu tiên câu trong "coach"). Không gộp làm rơi mục.
- Tác động bên ngoài: dòng động năm nay ("saoLuu", "luuHoaBayVaoCung", "tuHoaVaCham") đổ vào tam giác tạo kịch bản gì; có dính 3 Thất/Hàm Trì không.
- Ứng Kỳ đời thực: đối chiếu trực tiếp đáp án khảo sát chứng minh mạch điện đã "ứng". Dính kho thì gọi tên "Mở kho phát tài" / "Khóa kho kẹt tiền".
- Thuốc giải Hóa Khoa: giải pháp Coaching cụ thể dựa kênh giải tỏa user đã khai.

### PHẦN 4: QUÉT HẠN CÁC THÁNG CÒN LẠI (LƯU NGUYỆT)
- Dựa "luuNguyet12Thang": tháng nào dính Kỵ/xấu → dự báo biến cố ngắn hạn + cách thủ thế. Tháng hanh thông/dính Lộc-Khoa/"Mở kho" → gọi tên cơ hội để bung sức.

### PHẦN 5: CHỌN NGÀY LÀNH (LƯU NHẬT)
- Dựa "luuNhatBienDong" (nếu có): Ngày Đẹp (dòng Lộc/Khoa bao bọc) → khai trương, ký kết, nộp hồ sơ, gặp đối tác. Ngày Xấu (dính Kỵ/Phá Thế xung mục tiêu) → đứng im, ẩn mình, không tranh cãi, không xuống tiền. Danh sách rỗng → nói tháng này khá êm.

## 4B. CẤU TRÚC RIÊNG CHO CHỦ ĐỀ "VẬN HẠN TỔNG QUAN"
Khi "chuDeDangXem" là "Vận hạn tổng quan": BỎ cấu trúc 5 phần ở trên, dùng 7 phần dưới đây. Đọc "tongQuan" (mảng 4 tam giác đã lập cực sẵn: Cốt lõi Mệnh / Sự nghiệp / Tài chính / Tình cảm — mỗi mảng có menhChuDe/tatChuDe/khoChuDe + nhan) và "vanHanCacNam" (mảng từng năm tới hết đại hạn).
- PHẦN 1 — CỐT LÕI MỆNH: luận tam giác "Cốt lõi Mệnh" (bản chất, nội tâm, cái nôi gốc gác). Lồng câu Hiện tại "điều đang chiếm tâm trí nhất".
- PHẦN 2 — SỰ NGHIỆP: luận tam giác "Sự nghiệp" (Tầng 1 tĩnh quét 3 tọa độ + Tầng 2 động lồng đáp án trạng thái công việc).
- PHẦN 3 — TÀI CHÍNH: luận tam giác "Tài chính" (lồng đáp án trạng thái tài chính).
- PHẦN 4 — TÌNH CẢM: luận tam giác "Tình cảm" (lồng đáp án trạng thái tình cảm).
- PHẦN 5 — VẬN HẠN NĂM NAY: dòng động năm xét đổ mạnh vào đâu (saoLuu/luuHoaBayVaoCung/tamDiem); tháng cát/hung ("luuNguyet12Thang").
- PHẦN 6 — VẬN HẠN ĐẾN HẾT ĐẠI HẠN: đọc "vanHanCacNam", vẽ bằng LỜI quỹ đạo lên–xuống các năm. Gọi tên rõ: năm ĐỈNH (nhan = NĂM_BUNG_SỨC_PHÁT_TÀI → năm bung sức, nên tiến/mở rộng/xuống tiền), năm ĐÁY (nhan = NĂM_XUNG_KÍCH_LEVEL_3 → năm hạn nặng, phải thủ thế/giữ mình), năm TÍCH LŨY (đi chắc, bồi đắp). Diễn giải "lyDo" mỗi mốc bằng lời đời thường, KHÔNG nói tên sao. Chốt năm bản lề nên hành động.
- PHẦN 7 — KẾT NỐI TỔNG HỢP: nối 4 mảng + vận hạn thành MỘT sợi chỉ đỏ. Chỉ rõ gốc Mệnh chi phối các mảng thế nào, mảng nào đang là điểm nghẽn, mảng nào là đòn bẩy, và năm nào là bước ngoặt để dồn lực. Kết bằng lời khuyên tổng thể, ấm áp.

## 5. LỆNH XUẤT
Đọc toàn bộ JSON, vận dụng tối đa bộ lọc Bắc Phái + "maTranLuanGiai", xuất đủ 5 phần, không tóm tắt, không bỏ sót. Bắt đầu bằng lời chào ấm áp.
TUYỆT ĐỐI KHÔNG BỎ SÓT: mọi mục trong "canhBaoCungAn" PHẢI xuất hiện đâu đó — "thuocChuDe": true mổ sâu ở Phần 3, false đưa vào Phần 2. Mỗi mục nêu rõ: lĩnh vực đời thường, thế khó là gì, tại sao, giải pháp. Linh hồn là dòng chảy Tứ Hóa Bắc phái — chỉ rõ thế khó, thế tuyệt, cái gì chưa mở và vì sao, rồi lối ra.
TRƯỚC KHI XUẤT: rà lại toàn bài, nếu còn BẤT KỲ tên sao hay thuật ngữ tử vi nào thì viết lại câu đó bằng lời đời thường.`

// Gọi API
async function runAIInterpret(){
  const btn=document.getElementById('btn-ai')
  const out=document.getElementById('ai-result')
  if(!window.__interp){ out.innerHTML='<div style="color:#c00">Chưa có dữ liệu lá số.</div>'; return }
  const ctx=buildAIContext()
  const userMsg='Dữ liệu lá số (JSON):\n```json\n'+JSON.stringify(ctx,null,2)+'\n```\n\nHãy luận trước về cốt lõi con người này (dựa cotLoiMenh + hoanCanhThucTe), rồi mới luận chủ đề "'+ctx.chuDeDangXem+'" năm '+ctx.namXem+'. Nhớ neo vào hoàn cảnh thật và điều họ đang quan tâm.'
  btn.disabled=true; btn.textContent='⏳ Đang luận giải...'
  out.innerHTML='<div style="color:#888;font-size:.78rem">AI đang phân tích lá số...</div>'
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:4000,
        system:AI_SYSTEM_PROMPT,
        messages:[{role:'user',content:userMsg}]
      })
    })
    if(!resp.ok) throw new Error('HTTP '+resp.status)
    const data=await resp.json()
    const text=data.content.filter(c=>c.type==='text').map(c=>c.text).join('\n')
    window.__aiText=text
    out.innerHTML='<div id="ai-rendered" style="background:white;border:1px solid #d8c8e8;border-radius:8px;padding:14px 18px;font-size:.82rem;line-height:1.65">'+renderMarkdown(text)+'</div>'
  }catch(e){
    out.innerHTML='<div style="background:#fff6f6;border:1px solid #e8c0c0;border-radius:8px;padding:12px;font-size:.76rem;color:#a01818">'+
      '⚠ Không gọi được API ('+escapeHtml(e.message)+').<br>Nếu đang mở file local, hãy chạy trong Claude.ai, hoặc bấm "Xem/Copy prompt" để tự dán sang Claude.</div>'
  }finally{ btn.disabled=false; btn.textContent='✨ Luận giải chi tiết bằng AI' }
}

- Chỉ ra: điểm hợp (cùng tận hưởng được gì), điểm dễ va chạm (mâu thuẫn hay nảy sinh ở đâu), và cách hóa giải.

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// Render markdown cơ bản: ## heading, **bold**, - list, đoạn văn
function renderMarkdown(md){
  const lines=escapeHtml(md).split('\n')
  let html='', inList=false
  for(let line of lines){
    line=line.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    if(/^##\s+/.test(line)){
      if(inList){html+='</ul>';inList=false}
      html+='<div style="font-weight:700;color:#5a2a8a;margin:12px 0 4px;font-size:.88rem">'+line.replace(/^##\s+/,'')+'</div>'
    } else if(/^[-*]\s+/.test(line)){
      if(!inList){html+='<ul style="margin:4px 0 4px 4px;padding-left:16px">';inList=true}
      html+='<li style="margin-bottom:3px">'+line.replace(/^[-*]\s+/,'')+'</li>'
    } else if(line.trim()===''){
      if(inList){html+='</ul>';inList=false}
    } else {
      if(inList){html+='</ul>';inList=false}
      html+='<p style="margin:4px 0">'+line+'</p>'
    }
  }
  if(inList) html+='</ul>'
  return html
}

function formatVND(n){ return (n||0).toLocaleString('vi-VN')+'đ' }
function getAmountRaw(kind){
  if(kind==='couple') return PAYMENT_CONFIG.priceCouple
  if(window.__lastTopic==='van_han') return PAYMENT_CONFIG.priceVanHan
  return PAYMENT_CONFIG.priceSingle
}
function getAmount(kind){ return formatVND(getAmountRaw(kind)) }

// Gom thông tin lá số (để chủ web lập lại & luận giải) — gọn, dạng text

// Lá số dạng text gọn để chủ web đọc ngay trong email (không cần file)
function chartToText(nr){
  const gioiTinh=nr.input?.gender==='male'?'Nam':'Nữ'
  const tenGio=CHI[nr.input?.branchH]||('chi '+nr.input?.branchH)
  const ngayXem=document.getElementById('target-date')?.value||'?'
  const gioXem=CHI[parseInt(document.getElementById('target-hour')?.value)]||'?'
  const t=window.__transit
  let s='Mệnh '+chiName(nr.menhIndex)+' · Thân '+chiName(nr.thanIndex)+' · '+nr.cucName+' · '+(nr.napAm?.n||'')+' · '+nr.ys+' '+nr.yb+'\n'
  s+='Ngày sinh DL: '+(nr.input?.dob||'?')+' · Giờ sinh: '+tenGio+' · Giới tính: '+gioiTinh+'\n'
  s+='Ngày xem: '+ngayXem+' · Giờ xem: '+gioXem+' · Năm xét: '+(t?(t.targetYear+' '+t.transitYB):'?')+'\n'
  for(let b=1;b<=12;b++){
    const stars=[...(nr.mainStarsByPalace[b]||[]),...(nr.subStarsByPalace[b]||[])]
    s+='• '+chiName(b)+' ['+(nr.palaceMap[b]||'')+']'+(b===nr.menhIndex?' (Mệnh)':'')+(b===nr.thanIndex?' (Thân)':'')+': '+(stars.join(', ')||'—')+'\n'
  }
  return s
}
function laSoToText(kind){
  if(kind==='couple'){
    const {A,B}=window.__couple||{}
    return '===== NGƯỜI A =====\n'+(A?chartToText(A.raw):'(thiếu)')+'\n===== NGƯỜI B =====\n'+(B?chartToText(B.raw):'(thiếu)')
  }
  return window.__natalResult?chartToText(window.__natalResult):'(thiếu)'
}

// Ngày giờ sinh của đơn (để chủ web lập lại lá số bằng bản owner)
function orderBirthInfo(kind){
  const fmt=(r)=>{ if(!r) return '(thiếu)'
    const dob=r.input?.dob||'?'; const gio=CHI[r.input?.branchH]||'?'
    const gt=r.input?.gender==='male'?'Nam':'Nữ'
    return 'Ngày sinh (DL): '+dob+' · Giờ: '+gio+' · '+gt }
  if(kind==='couple'){
    const {A,B}=window.__couple||{}
    return 'Người A — '+fmt(A?.raw)+'\nNgười B — '+fmt(B?.raw)
  }
  return fmt(window.__natalResult)
}

// ───────── Định dạng khảo sát dạng dễ đọc cho email chủ web (KHÔNG JSON) ─────────
function fmtAnswersReadable(answers){
  const KH={A:'HIỆN TẠI', B:'QUÁ KHỨ', C:'ĐỊNH HƯỚNG'}
  const byBlock={}
  Object.values(answers||{}).forEach(a=>{ const k=a.khoi||'-'; (byBlock[k]=byBlock[k]||[]).push(a) })
  let s=''
  ;['A','B','C','-'].forEach(k=>{
    if(!byBlock[k]) return
    if(KH[k]) s+='  ['+KH[k]+']\n'
    byBlock[k].forEach(a=>{ s+='  • '+a.cau+'\n      → '+(Array.isArray(a.dapAn)?a.dapAn.join(' | '):a.dapAn)+'\n' })
  })
  return s||'  (không trả lời câu nào)\n'
}
function fmtProfileReadable(p){
  if(!p||!Object.keys(p).length) return ''
  let s='THÔNG TIN NỀN:\n'
  Object.entries(p).forEach(([k,v])=>{ s+='  • '+(PROFILE_LABEL[k]||k)+': '+v+'\n' })
  return s+'\n'
}
function orderAnswersText(kind){
  if(kind==='couple'){
    const {A,B}=window.__couple||{}
    let s='ĐIỀU BĂN KHOĂN: '+(window.__concern||'(không nhập)')+'\n\n'
    s+=fmtProfileReadable(window.__profile)
    s+='--- KHẢO SÁT NGƯỜI A ---\n'+fmtAnswersReadable(A?.answers)+'\n'
    s+='--- KHẢO SÁT NGƯỜI B ---\n'+fmtAnswersReadable(B?.answers)
    return s
  }
  let s='ĐIỀU BĂN KHOĂN: '+(window.__concern||'(không nhập)')+'\n\n'
  s+=fmtProfileReadable(window.__profile)
  s+='KHẢO SÁT THEO CHỦ ĐỀ:\n'+fmtAnswersReadable(window.__answers)
  return s
}

async function submitPayment(kind){
  const email=(document.getElementById('pay-email')?.value||'').trim()
  const proof=document.getElementById('pay-proof')?.files?.[0]
  const status=document.getElementById('pay-status')
  const btn=document.getElementById('pay-submit')
  const reEmail=/^[^\s@]+@[^\s@]+\.[^\s@]+$/
  if(!reEmail.test(email)){ status.innerHTML='<div style="color:#c00;font-size:.76rem">Vui lòng nhập email hợp lệ.</div>'; return }
  if(!proof){ status.innerHTML='<div style="color:#c00;font-size:.76rem">Vui lòng tải lên ảnh đã chuyển khoản.</div>'; return }

  const c=PAYMENT_CONFIG
  const chuDe=kind==='couple'?'Hợp đôi (2 người)':(TOPIC_LABELS[window.__lastTopic]||kind)
  // (email không kèm prompt/JSON nữa — chủ web tự nhập lại bên bản owner)

  // Không có EmailJS config → chế độ thử
  if(!c.emailjsPublicKey||!c.emailjsServiceId||!c.emailjsTemplateId){
    window.__pendingOrder={kind,email}
    if(window.__ownerMode){
      status.innerHTML='<div style="background:#fff8ec;border:1px solid #e8d0a0;border-radius:8px;padding:10px;font-size:.74rem;color:#7a5a20">Chế độ thử: chưa cấu hình EmailJS. Bấm nút dưới để tải gói.</div>'+ownerDownloadButtons()
    } else {
      status.innerHTML='<div style="background:#fff8ec;border:1px solid #e8d0a0;border-radius:8px;padding:10px;font-size:.74rem;color:#7a5a20">Hệ thống đang cập nhật, bạn vui lòng thử lại sau ít phút.</div>'
    }
    return
  }

  btn.disabled=true; btn.textContent='⏳ Đang gửi...'
  status.innerHTML='<div style="color:#888;font-size:.76rem">Đang gửi yêu cầu...</div>'
  try{
    // Email báo đơn cho CHỦ WEB: chỉ thông tin đầu vào dạng dễ đọc (KHÔNG kèm JSON/prompt).
    // Chủ web tự nhập lại bên bản owner rồi xuất JSON ở đó.
    const khaoSatText = orderAnswersText(kind)
    const templateParams={
      name        : 'Tử Vi — '+chuDe,
      email       : email,
      message     : '=== ĐƠN MỚI ===\n'+
                    'Email khách: '+email+'\n'+
                    'Chủ đề: '+chuDe+'\n'+
                    'Giá: '+getAmount(kind)+'\n'+
                    'Nội dung CK: '+c.transferPrefix+' '+email+'\n\n'+
                    '=== THÔNG TIN SINH ===\n'+orderBirthInfo(kind)+'\n\n'+
                    '=== LỰA CHỌN KHẢO SÁT ===\n'+khaoSatText,
      chu_de      : chuDe,
      email_khach : email,
      gia         : getAmount(kind),
      noi_dung_ck : c.transferPrefix+' '+email,
      ngay_gio_sinh: orderBirthInfo(kind),
      khao_sat    : khaoSatText
    }
    emailjs.init(c.emailjsPublicKey)
    const resp=await emailjs.send(c.emailjsServiceId, c.emailjsTemplateId, templateParams)
    console.log('[TuVi] EmailJS OK:', resp.status, resp.text)
    paymentSuccess(status)
  }catch(e){
    console.error('[TuVi] EmailJS error:', e)
    window.__pendingOrder={kind,email}
    if(window.__ownerMode){
      status.innerHTML='<div style="background:#fff6f6;border:1px solid #e8c0c0;border-radius:8px;padding:10px;font-size:.74rem;color:#a01818">⚠ Lỗi EmailJS: <b>'+escapeHtml(String(e?.text||e?.message||e))+'</b></div>'+ownerDownloadButtons()
    } else {
      status.innerHTML='<div style="background:#fff6f6;border:1px solid #e8c0c0;border-radius:8px;padding:10px;font-size:.74rem;color:#a01818">Gửi chưa thành công, bạn vui lòng thử lại sau giây lát. Nếu vẫn lỗi, hãy liên hệ trực tiếp giúp mình nhé.</div>'
    }
  }finally{ btn.disabled=false; btn.textContent='📨 Gửi luận giải' }
}

function ownerDownloadButtons(){

function dlFile(blob,name){
  try{
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name
    document.body.appendChild(a); a.click()
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove() }, 1500)
  }catch(e){ alert('Không tải được file: '+e.message) }
}
function dlPrompt(){
  const o=window.__pendingOrder; if(!o) return
  const aiPrompt=buildAIPromptForOrder(o.kind)
  const header='YÊU CẦU LUẬN GIẢI\nEmail khách: '+o.email+'\nNội dung CK: '+PAYMENT_CONFIG.transferPrefix+' '+o.email+'\n\n=== DÁN PHẦN DƯỚI ĐÂY CHO AI ===\n\n'
  dlFile(new Blob([header+aiPrompt],{type:'text/plain;charset=utf-8'}), 'prompt-cho-ai-'+Date.now()+'.txt')
}
function dlWord(){
  const o=window.__pendingOrder; if(!o) return
  const w=buildWordDoc(o.kind)
  if(!w){ alert('Chưa có dữ liệu lá số để xuất Word.'); return }
  dlFile(w.blob, w.filename)
}

// XUẤT BẢN WORD (lá số + bảng đại hạn + tứ hóa + luận giải)
// ══════════════════════════════════════════════════
function laSoToWordTable(nr){
  // 4x4, ô giữa gộp 2x2
  const cell=(b)=>{
    const stars=[...(nr.mainStarsByPalace[b]||[]),...(nr.subStarsByPalace[b]||[])].join(', ')
    const ts=''
    const ov=(nr.overlays||[]).filter(o=>o.palaces.includes(b)).map(o=>o.name).join('/')
    const tag=(b===nr.menhIndex?' ★Mệnh':'')+(b===nr.thanIndex?' ◆Thân':'')
    return `<td style="border:1px solid #999;vertical-align:top;padding:4px;width:25%;height:90px;font-size:9px">`+
      `<div style="font-weight:bold">${chiName(b)} ${(nr.canMap&&nr.canMap[b])||''} <span style="color:#777">${nr.palaceMap[b]||''}</span>${tag}${ov?' ['+ov+']':''}</div>`+
      `<div style="color:#333;margin-top:2px">${stars||'—'}${ts}</div></td>`
  }
  const center=`<td colspan="2" rowspan="2" style="border:1px solid #999;text-align:center;vertical-align:middle;background:#faf6ee;font-size:10px">`+
    `<b>LÁ SỐ TỬ VI</b><br>Mệnh: ${chiName(nr.menhIndex)} · Thân: ${chiName(nr.thanIndex)}<br>${nr.cucName}<br>${nr.ys} ${nr.yb}</td>`
  return `<table style="border-collapse:collapse;width:100%;table-layout:fixed">`+
    `<tr>${cell(10)}${cell(9)}${cell(8)}${cell(7)}</tr>`+
    `<tr>${cell(11)}${center}${cell(6)}</tr>`+
    `<tr>${cell(12)}${cell(5)}</tr>`+
    `<tr>${cell(1)}${cell(2)}${cell(3)}${cell(4)}</tr></table>`
}
// Lấy các bảng (header + table) trong #time-panel, bỏ phần thẻ grid
function timePanelTablesHTML(){
  const tp=document.getElementById('time-panel'); if(!tp) return ''
  // Lấy toàn bộ nội dung time-panel (mọi bảng phân tích) cho Word
  // Clone để không ảnh hưởng DOM gốc, gỡ các thuộc tính tương tác
  const clone=tp.cloneNode(true)
  clone.querySelectorAll('script,button,[onclick]').forEach(el=>{
    if(el.tagName==='SCRIPT'||el.tagName==='BUTTON') el.remove()
    else el.removeAttribute('onclick')
  })
  return clone.innerHTML
}
// Bảng Lưu Nhật riêng (nằm ngoài time-panel)
function luuNhatTableHTML(){
  const b=document.getElementById('luunhat-badge')
  return b?b.innerHTML:''
}
function buildWordDoc(kind){
  const FONT='Times New Roman, Times, serif'
  const baseStyle=`font-family:${FONT};font-size:12pt`
  let body='', title='Luận Giải Tử Vi'
  if(kind==='couple'){
    const {A,B}=window.__couple||{}
    title='Luận Giải Tử Vi — Hợp Đôi'
    body+='<h2 style="'+baseStyle+'">Lá số người A</h2>'+(A?laSoToWordTable(A.raw):'(thiếu)')
    body+='<h2 style="'+baseStyle+';margin-top:14px">Lá số người B</h2>'+(B?laSoToWordTable(B.raw):'(thiếu)')
    body+='<h2 style="'+baseStyle+';margin-top:14px">Luận giải hợp đôi</h2>'+(window.__coupleAIText?renderMarkdown(window.__coupleAIText):'<i>(Dán JSON cho AI để lấy bài luận, rồi điền vào đây)</i>')
  } else {
    const nr=window.__natalResult, t=window.__transit
    if(!nr) return null
    title='Luận Giải Tử Vi'
    const ngaySinh=nr.input?.dob||'?'
    const gioSinh=CHI[nr.input?.branchH]||'?'
    const gioiTinh=nr.input?.gender==='male'?'Nam':'Nữ'
    const ngayXem=document.getElementById('target-date')?.value||'?'
    const gioXem=CHI[parseInt(document.getElementById('target-hour')?.value)]||'?'
    body+=`<p style="${baseStyle}"><b>Ngày sinh:</b> ${ngaySinh} · Giờ: ${gioSinh} · ${gioiTinh}<br>`+
      `<b>Mệnh:</b> ${chiName(nr.menhIndex)} · <b>Thân:</b> ${chiName(nr.thanIndex)} · ${nr.cucName}<br>`+
      `<b>Ngày xem:</b> ${ngayXem} · Giờ xem: ${gioXem} · Năm xét: ${t?(t.targetYear+' '+t.transitYB):''}</p>`
    body+='<h2 style="'+baseStyle+'">Lá số</h2>'+laSoToWordTable(nr)
    body+='<h2 style="'+baseStyle+';margin-top:14px">Vòng hạn &amp; các bảng phân tích</h2>'
    body+='<div style="margin-top:8px">'+timePanelTablesHTML()+'</div>'
    const lnTable=luuNhatTableHTML()
    if(lnTable) body+='<h2 style="'+baseStyle+';margin-top:14px">Bảng Lưu Nhật (ngày tốt/xấu trong tháng)</h2>'+lnTable
    body+=`<h2 style="${baseStyle};margin-top:14px">Luận giải chi tiết</h2>`+
      (window.__aiText?renderMarkdown(window.__aiText):'<i>(Dán JSON cho AI để lấy bài luận, rồi điền vào đây)</i>')
  }
  const wordStyle=`body{font-family:${FONT};font-size:12pt} p,li,td,th{font-family:${FONT};font-size:12pt} h1{font-family:${FONT};font-size:16pt} h2{font-family:${FONT};font-size:13pt} h3{font-family:${FONT};font-size:12pt}`
  const html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'+
    '<head><meta charset="utf-8"><title>'+title+'</title><style>'+wordStyle+'</style></head>'+
    '<body><h1>'+title+'</h1>'+body+'</body></html>'
  const blob=new Blob(['\ufeff'+html],{type:'application/msword'})
  return {blob, filename:'Luan-Giai-Tu-Vi-'+Date.now()+'.doc', html}
}
function exportToWord(kind){
  const doc=buildWordDoc(kind)
  if(!doc){ alert('Chưa có lá số. Hãy lập lá số trước.'); return }
  const a=document.createElement('a'); a.href=URL.createObjectURL(doc.blob)
  a.download=doc.filename; a.click()
}

// Dựng prompt SẴN SÀNG dán cho AI (gồm system prompt + JSON lá số). Chủ web chỉ việc copy file này dán vào Claude.
function buildAIPromptForOrder(kind){
  if(kind==='couple'){
    const {A,B}=window.__couple||{}
    const payload={
      nguoiA:{laSo:A?.chart, hoanCanh:{dapAnKhaiBao:fmtAnswersForAI(A?.answers)}},
      nguoiB:{laSo:B?.chart, hoanCanh:{dapAnKhaiBao:fmtAnswersForAI(B?.answers)}}
    }
    return COUPLE_SYSTEM_PROMPT+'\n\n---\n\nDữ liệu 2 lá số (JSON):\n```json\n'+JSON.stringify(payload,null,2)+'\n```\n\nHãy luận mức độ hợp/khắc của cặp đôi này.'
  }
  const ctx=buildAIContext()
  return AI_SYSTEM_PROMPT+'\n\n---\n\nDữ liệu lá số (JSON):\n```json\n'+JSON.stringify(ctx,null,2)+'\n```\n\nHãy luận trước về cốt lõi con người này (dựa cotLoiMenh + hoanCanhThucTe), rồi mới luận chủ đề "'+ctx.chuDeDangXem+'" năm '+ctx.namXem+'. Nhớ neo vào hoàn cảnh thật và điều họ đang quan tâm.'
}
